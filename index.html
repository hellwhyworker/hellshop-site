        function App() {
            const [usersDatabase, setUsersDatabase] = React.useState([]);
            const [privateMessages, setPrivateMessages] = React.useState([]);
            const [globalReports, setGlobalReports] = React.useState([]);
            const [lang, setLang] = React.useState(() => localStorage.getItem("hellshop_lang") || "ru");
            const [notifsEnabled, setNotifsEnabled] = React.useState(() => localStorage.getItem("hellshop_notifs") === "true");
            
            const [currentUser, setCurrentUser] = React.useState(() => {
                const saved = localStorage.getItem("hellshop_currentUser");
                return saved ? JSON.parse(saved) : null;
            });

            // ИЗОЛИРОВАННЫЕ ДАННЫЕ (только для текущего юзера)
            const [chatMessages, setChatMessages] = React.useState([]);
            const [openedChats, setOpenedChats] = React.useState([]);
            const [supportMenu, setSupportMenu] = React.useState("main");

            // Загрузка изолированных данных при смене пользователя
            React.useEffect(() => {
                if (currentUser) {
                    const savedChats = localStorage.getItem("hs_opened_" + currentUser.id);
                    setOpenedChats(savedChats ? JSON.parse(savedChats) : []);

                    const savedMsgs = localStorage.getItem("hs_support_" + currentUser.id);
                    const initTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    setChatMessages(savedMsgs ? JSON.parse(savedMsgs) : [{ sender: "Бот", avatar: SUPPORT_AVATAR, text: t[lang].botWelcome, time: initTime }]);

                    const savedMenu = localStorage.getItem("hs_menu_" + currentUser.id);
                    setSupportMenu(savedMenu || "main");
                } else {
                    setOpenedChats([]); setChatMessages([]); setSupportMenu("main");
                }
            }, [currentUser?.id]);

            // Сохранение изменений в локальную память юзера
            React.useEffect(() => {
                if (currentUser) {
                    localStorage.setItem("hs_opened_" + currentUser.id, JSON.stringify(openedChats));
                    localStorage.setItem("hs_support_" + currentUser.id, JSON.stringify(chatMessages));
                    localStorage.setItem("hs_menu_" + currentUser.id, supportMenu);
                }
            }, [openedChats, chatMessages, supportMenu, currentUser?.id]);

            React.useEffect(() => { localStorage.setItem("hellshop_lang", lang); }, [lang]);
            React.useEffect(() => { localStorage.setItem("hellshop_notifs", notifsEnabled); }, [notifsEnabled]);

            // ПОДКЛЮЧЕНИЕ К FIREBASE
            React.useEffect(() => {
                db.ref('users').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setUsersDatabase(Object.values(data));
                    else setUsersDatabase([]);
                });

                db.ref('privateMessages').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setPrivateMessages(Object.values(data));
                    else setPrivateMessages([]);
                });

                db.ref('reports').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) setGlobalReports(Object.values(data));
                    else setGlobalReports([]);
                });
            }, []);

            // АВТО-ОБНОВЛЕНИЕ СПИСКА ЧАТОВ И ПУШ-УВЕДОМЛЕНИЯ
            React.useEffect(() => {
                if (!currentUser) return;
                setOpenedChats(prevChats => {
                    let updatedChats = [...prevChats];
                    let changed = false;
                    privateMessages.forEach(msg => {
                        // Если сообщение адресовано нам
                        if (msg.toId === currentUser.id) {
                            if (!updatedChats.includes(msg.fromId)) { updatedChats.unshift(msg.fromId); changed = true; }
                            
                            // ПУШ УВЕДОМЛЕНИЯ
                            if (notifsEnabled && Notification.permission === "granted" && !msg.notified) {
                                const sender = usersDatabase.find(u => u.id === msg.fromId);
                                new Notification(`Новое сообщение от ${sender ? sender.username : msg.fromId}`, { body: msg.text, icon: sender ? sender.avatar : DEFAULT_AVATAR });
                                msg.notified = true; // чтобы не спамило
                            }
                        }
                        // Если мы писали
                        if (msg.fromId === currentUser.id && !updatedChats.includes(msg.toId)) { updatedChats.unshift(msg.toId); changed = true; }
                    });
                    return changed ? updatedChats : prevChats;
                });
            }, [privateMessages, currentUser, notifsEnabled, usersDatabase]);

            React.useEffect(() => {
                if (currentUser && usersDatabase.length > 0) {
                    const updatedMe = usersDatabase.find(u => u.id === currentUser.id);
                    if (updatedMe && JSON.stringify(updatedMe) !== JSON.stringify(currentUser)) {
                        setCurrentUser(updatedMe);
                        localStorage.setItem("hellshop_currentUser", JSON.stringify(updatedMe));
                    }
                }
            }, [usersDatabase, currentUser]);

            React.useEffect(() => {
                if (currentUser) {
                    const userRef = db.ref('users/' + currentUser.id);
                    userRef.update({ isOnline: true });
                    userRef.onDisconnect().update({ isOnline: false });
                }
            }, [currentUser]);

            const [activePage, setActivePage] = React.useState("main"); 
            const [activeChat, setActiveChat] = React.useState("support"); 
            const [isDropdownOpen, setIsDropdownOpen] = React.useState(false);
            const [chatMenuOpen, setChatMenuOpen] = React.useState(false); // Для 3-х точек
            const [isAuthModalOpen, setIsAuthModalOpen] = React.useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = React.useState(false);
            const [authMode, setAuthMode] = React.useState("login");
            const [inputUsername, setInputUsername] = React.useState("");
            const [inputPassword, setInputPassword] = React.useState("");
            const [typedMessage, setTypedMessage] = React.useState("");
            const [inputEmail, setInputEmail] = React.useState("");
            const [inputPhone, setInputPhone] = React.useState("");
            const [inputAvatar, setInputAvatar] = React.useState("");
            const [searchQuery, setSearchQuery] = React.useState("");

            const searchResults = searchQuery.trim() ? usersDatabase.filter(u => {
                const safeUsername = u.username ? u.username.toLowerCase() : "";
                const safeId = u.id ? u.id.toString() : "";
                return (safeId.includes(searchQuery) || safeUsername.includes(searchQuery.toLowerCase())) && (!currentUser || u.id !== currentUser.id);
            }) : [];

            React.useEffect(() => {
                if (currentUser && isSettingsModalOpen) {
                    setInputEmail(currentUser.email || "");
                    setInputPhone(currentUser.phone || "");
                    setInputAvatar(currentUser.avatar !== DEFAULT_AVATAR ? currentUser.avatar : "");
                }
            }, [isSettingsModalOpen, currentUser]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => { setInputAvatar(reader.result); };
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveSettings = () => {
                if (!currentUser) return;
                const updatedUser = { ...currentUser, email: inputEmail, phone: inputPhone, avatar: inputAvatar.trim() ? inputAvatar : DEFAULT_AVATAR };
                db.ref('users/' + currentUser.id).update(updatedUser);
                setIsSettingsModalOpen(false);
            };

            const toggleNotifs = () => {
                if (!notifsEnabled) {
                    Notification.requestPermission().then(perm => {
                        if (perm === "granted") setNotifsEnabled(true);
                        else alert("Разрешите уведомления в браузере!");
                    });
                } else {
                    setNotifsEnabled(false);
                }
            };

            const handleAuth = () => {
                if (!inputUsername.trim() || !inputPassword.trim()) return;
                if (authMode === "register") {
                    if (usersDatabase.find(u => u.username === inputUsername)) return alert("❌");
                    const isFirstUser = usersDatabase.length === 0;
                    const maxId = isFirstUser ? 100000 : Math.max(...usersDatabase.map(u => u.id || 100000));
                    const newId = maxId + 1; 
                    const userRole = isFirstUser ? "Всемогущий" : "Пользователь"; 
                    
                    const dateObj = new Date();
                    const formattedDate = dateObj.toLocaleDateString('ru-RU', {day: '2-digit', month: 'long', year: 'numeric'}) + ", " + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const newUser = { id: newId, username: inputUsername, password: inputPassword, avatar: DEFAULT_AVATAR, email: "", phone: "", role: userRole, isOnline: true, regDate: formattedDate, blocked: [] };
                    db.ref('users/' + newId).set(newUser);
                    setCurrentUser(newUser); 
                    localStorage.setItem("hellshop_currentUser", JSON.stringify(newUser));
                    
                    setOpenedChats([]);
                    setChatMessages([{ sender: "Бот", avatar: SUPPORT_AVATAR, text: t[lang].botWelcome, time: dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
                    setIsAuthModalOpen(false);
                } else {
                    const user = usersDatabase.find(u => u.username === inputUsername && u.password === inputPassword);
                    if (user) { 
                        setCurrentUser(user);
                        localStorage.setItem("hellshop_currentUser", JSON.stringify(user));
                        db.ref('users/' + user.id).update({ isOnline: true });
                        setIsAuthModalOpen(false); 
                    } else { alert("❌"); }
                }
                setInputUsername(""); setInputPassword("");
            };

            const handleLogout = () => {
                if (currentUser) db.ref('users/' + currentUser.id).update({ isOnline: false });
                setCurrentUser(null);
                localStorage.removeItem("hellshop_currentUser");
                setIsDropdownOpen(false); 
                setActivePage("main");
            };

            const openUserChat = (userId) => {
                if (!currentUser) return;
                if (!openedChats.includes(userId)) setOpenedChats([userId, ...openedChats]);
                setActiveChat(userId);
                setActivePage("messages");
                setSearchQuery(""); 
            };

            const handleGrantAdmin = (userId) => {
                if (window.confirm("Выдать АДМИНА?")) db.ref('users/' + userId).update({ role: "АДМИН" });
            };

            const handleRevokeAdmin = (userId) => {
                if (window.confirm("Снять АДМИНА?")) db.ref('users/' + userId).update({ role: "Пользователь" });
            };

            const handleBlock = (userId) => {
                setChatMenuOpen(false);
                const currentBlocked = currentUser.blocked || [];
                if (!currentBlocked.includes(userId)) {
                    db.ref('users/' + currentUser.id).update({ blocked: [...currentBlocked, userId] });
                    alert("Пользователь заблокирован. Вы больше не увидите его сообщения.");
                }
            };

            const handleReport = (userId) => {
                setChatMenuOpen(false);
                const now = Date.now();
                const myReports = globalReports.filter(r => r.fromId === currentUser.id && r.toId === userId);
                
                let canReport = true;
                if (myReports.length > 0) {
                    const lastReport = myReports[myReports.length - 1];
                    // 15 дней = 15 * 24 * 60 * 60 * 1000 = 1296000000 мс
                    if (now - lastReport.timestamp < 1296000000) {
                        canReport = false;
                    }
                }

                if (!canReport) {
                    alert(t[lang].reportWait);
                    return;
                }

                const reportDate = new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: 'short', year: 'numeric'}) + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                db.ref('reports').push({ fromId: currentUser.id, toId: userId, timestamp: now, dateStr: reportDate });
                alert(t[lang].reportSuccess);
            };

            const handleSendMessage = (text = typedMessage, isCategory = false) => {
                if (!text.trim()) return;
                const currentTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (activeChat === "support") {
                    if (text === "cat_back") { setSupportMenu("main"); return; }
                    
                    const userText = isCategory ? t[lang][text] : text;
                    const newMsg = { sender: currentUser ? currentUser.username : t[lang].you, avatar: currentUser ? currentUser.avatar : DEFAULT_AVATAR, text: userText, time: currentTime };
                    let updatedMessages = [...chatMessages, newMsg];
                    let botReplyText = "";
                    let newMenu = supportMenu;

                    if (isCategory) {
                        if (text === "cat_buyers") newMenu = "buyers";
                        const ansKey = text.replace("cat_", "ans_");
                        if (t[lang][ansKey]) botReplyText = t[lang][ansKey];
                    }

                    if (botReplyText) { updatedMessages.push({ sender: "Бот", avatar: SUPPORT_AVATAR, text: botReplyText, time: currentTime }); }
                    setChatMessages(updatedMessages);
                    if (newMenu !== supportMenu) setSupportMenu(newMenu);
                } 
                else if (typeof activeChat === "number") {
                    db.ref('privateMessages').push({ fromId: currentUser.id, toId: activeChat, text: text, time: currentTime });
                }
                setTypedMessage("");
            };

            const renderTable = (headers, type) => (
                <div style={{ backgroundColor: "rgba(20, 20, 20, 0.8)", borderRadius: "8px", overflow: "hidden", border: "1px solid #dc2626", marginTop: "20px" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: "14px" }}>
                        <thead style={{ backgroundColor: "rgba(40, 0, 0, 0.6)", borderBottom: "1px solid #dc2626" }}>
                            <tr>{headers.map((h, i) => <th key={i} style={{ padding: "15px", color: "#fca5a5" }}>{h}</th>)}</tr>
                        </thead>
                        <tbody>
                            <tr><td colSpan={headers.length} style={{ padding: "30px", textAlign: "center", color: "#888", fontSize: "15px" }}>{t[lang].historyEmpty}</td></tr>
                        </tbody>
                    </table>
                </div>
            );

            const activeUserObj = typeof activeChat === "number" ? usersDatabase.find(u => u.id === activeChat) : null;
            
            // ФИЛЬТРАЦИЯ СООБЩЕНИЙ: убираем те, что от заблокированных
            const blockedByMe = currentUser?.blocked || [];
            const activePrivateMessages = activeUserObj ? privateMessages.filter(m => 
                ((m.fromId === currentUser?.id && m.toId === activeUserObj.id) || 
                (m.fromId === activeUserObj.id && m.toId === currentUser?.id)) &&
                !blockedByMe.includes(m.fromId)
            ) : [];

            const activeButtons = supportMenu === "main" ? mainCategories : buyerCategories;
            const isAdmin = currentUser?.role === "Всемогущий" || currentUser?.role === "АДМИН";

            return (
                <div className="bloody-bg">
                    {/* ШАПКА */}
                    <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 30px", height: "70px", backgroundColor: "rgba(10, 0, 0, 0.9)", borderBottom: "2px solid #dc2626", boxShadow: "0 4px 15px rgba(220, 38, 38, 0.2)" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: "30px" }}>
                            <div onClick={() => setActivePage("main")} className="neon-text" style={{ fontSize: "24px", fontWeight: "900", color: "#dc2626", cursor: "pointer", letterSpacing: "1px" }}>HELL<span style={{ color: "#fff" }}>SHOP</span></div>
                        </div>

                        <div style={{ display: "flex", alignItems: "center", gap: "25px" }}>
                            <div style={{ display: "flex", gap: "20px", fontSize: "14px", fontWeight: "500" }}>
                                {["purchases", "sales", "messages", "finances"].map(page => (
                                    <span key={page} onClick={() => setActivePage(page)} style={{ cursor: "pointer", transition: "0.2s", color: activePage === page ? "#dc2626" : "#a3a3a3", borderBottom: activePage === page ? "2px solid #dc2626" : "none", paddingBottom: "23px", paddingTop: "25px" }}>
                                        {t[lang][page]}
                                    </span>
                                ))}
                                {isAdmin && (
                                    <span onClick={() => setActivePage("reportsTab")} style={{ cursor: "pointer", transition: "0.2s", color: activePage === "reportsTab" ? "#ea580c" : "#a3a3a3", borderBottom: activePage === "reportsTab" ? "2px solid #ea580c" : "none", paddingBottom: "23px", paddingTop: "25px", fontWeight: "bold" }}>
                                        {t[lang].reportsTab}
                                    </span>
                                )}
                            </div>

                            <div style={{ position: "relative" }}>
                                {currentUser ? (
                                    <div onClick={() => setIsDropdownOpen(!isDropdownOpen)} style={{ display: "flex", alignItems: "center", gap: "8px", cursor: "pointer" }}>
                                        <div style={{ position: "relative" }}>
                                            <img src={currentUser.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #dc2626", backgroundColor: "#141414" }} />
                                            <div style={{ position: "absolute", bottom: "0", right: "0", width: "8px", height: "8px", backgroundColor: "#4ade80", borderRadius: "50%", border: "1px solid #141414" }}></div>
                                        </div>
                                        <span style={{ fontSize: "10px", color: "#dc2626" }}>▼</span>
                                    </div>
                                ) : (
                                    <button onClick={() => { setAuthMode("login"); setIsAuthModalOpen(true); }} style={{ backgroundColor: "#dc2626", color: "#fff", border: "none", padding: "8px 16px", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>{t[lang].login}</button>
                                )}
                                {isDropdownOpen && currentUser && (
                                    <div style={{ position: "absolute", top: "50px", right: "0", backgroundColor: "rgba(15, 0, 0, 0.95)", border: "1px solid #dc2626", borderRadius: "6px", width: "230px", zIndex: 10, padding: "10px 0", boxShadow: "0 10px 30px rgba(220,38,38,0.3)" }}>
                                        <div style={{ padding: "5px 15px", display: "flex", alignItems: "center", flexWrap: "nowrap", overflow: "hidden" }}>
                                            <span style={{ fontWeight: "bold", color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100px" }}>{currentUser.username}</span>
                                            <RoleBadge role={currentUser.role} lang={lang} />
                                        </div>
                                        <div style={{ padding: "0 15px 5px 15px", color: "#dc2626", fontSize: "12px", display: "flex", justifyContent: "space-between" }}>
                                            <span>ID: {currentUser.id}</span>
                                            <span style={{ color: "#4ade80" }}>{t[lang].online}</span>
                                        </div>
                                        <hr style={{ border: "0", borderTop: "1px solid #dc2626", margin: "10px 0", opacity: "0.5" }} />
                                        <div onClick={() => { setIsSettingsModalOpen(true); setIsDropdownOpen(false); }} style={{ padding: "8px 15px", cursor: "pointer", color: "#e5e5e5" }}>{t[lang].settings}</div>
                                        <div onClick={handleLogout} style={{ padding: "8px 15px", cursor: "pointer", color: "#ef4444" }}>{t[lang].logout}</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* ОСНОВНОЙ КОНТЕНТ */}
                    <main style={{ padding: "40px 50px", maxWidth: "1200px", margin: "0 auto" }}>
                        {!currentUser && activePage !== "main" ? (
                            <div style={{ textAlign: "center", padding: "100px 0" }}>
                                <h2 style={{ color: "#dc2626" }} className="neon-text">{t[lang].accessDenied}</h2>
                                <p style={{ color: "#888" }}>{t[lang].loginReq}</p>
                                <button onClick={() => setIsAuthModalOpen(true)} style={{ marginTop: "20px", padding: "10px 20px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>{t[lang].loginBtn}</button>
                            </div>
                        ) : (
                            <>
                                {activePage === "main" && (
                                    <div style={{ textAlign: "center", paddingTop: "50px" }}>
                                        <h1 className="neon-text" style={{ color: "#dc2626", textTransform: "uppercase", letterSpacing: "2px", margin: 0, fontSize: "36px" }}>{t[lang].appTitle}</h1>
                                        <p style={{ color: "#fca5a5", marginTop: "15px", fontSize: "18px" }}>{t[lang].appSub}</p>
                                    </div>
                                )}

                                {activePage === "purchases" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>{t[lang].purchases}</h1>{renderTable([t[lang].date, t[lang].order, t[lang].desc, t[lang].seller, t[lang].status, t[lang].sum], "purchases")}</div>)}
                                {activePage === "sales" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>{t[lang].sales}</h1>{renderTable([t[lang].date, t[lang].order, t[lang].desc, t[lang].buyer, t[lang].status, t[lang].sum], "sales")}</div>)}
                                {activePage === "finances" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>{t[lang].finances}</h1>{renderTable([t[lang].date, t[lang].desc, t[lang].status, t[lang].sum], "finances")}</div>)}

                                {activePage === "reportsTab" && isAdmin && (
                                    <div>
                                        <h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#ea580c" }}>{t[lang].reportsTab} (Admin Panel)</h1>
                                        <div style={{ backgroundColor: "rgba(20, 20, 20, 0.8)", borderRadius: "8px", overflow: "hidden", border: "1px solid #ea580c", marginTop: "20px" }}>
                                            <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: "14px" }}>
                                                <thead style={{ backgroundColor: "rgba(40, 10, 0, 0.6)", borderBottom: "1px solid #ea580c" }}>
                                                    <tr>
                                                        <th style={{ padding: "15px", color: "#fdba74" }}>От кого (ID)</th>
                                                        <th style={{ padding: "15px", color: "#fdba74" }}>На кого (ID)</th>
                                                        <th style={{ padding: "15px", color: "#fdba74" }}>Дата</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {globalReports.length === 0 ? (<tr><td colSpan="3" style={{ padding: "30px", textAlign: "center", color: "#888" }}>Нет жалоб</td></tr>) : 
                                                    globalReports.map((r, idx) => (
                                                        <tr key={idx} style={{ borderBottom: "1px solid #333" }}>
                                                            <td style={{ padding: "15px", color: "#fff" }}>{r.fromId}</td>
                                                            <td style={{ padding: "15px", color: "#ea580c", fontWeight: "bold" }}>{r.toId}</td>
                                                            <td style={{ padding: "15px", color: "#888" }}>{r.dateStr}</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                )}

                                {activePage === "messages" && (
                                    <div style={{ display: "flex", border: "1px solid #dc2626", borderRadius: "8px", height: "700px", backgroundColor: "rgba(10, 0, 0, 0.8)", overflow: "hidden", boxShadow: "0 0 20px rgba(220,38,38,0.15)" }}>
                                        
                                        {/* ЛЕВАЯ КОЛОНКА */}
                                        <div style={{ width: "320px", borderRight: "1px solid #dc2626", overflowY: "auto", backgroundColor: "rgba(0,0,0,0.5)", display: "flex", flexDirection: "column" }}>
                                            <div style={{ padding: "20px", fontSize: "24px", fontWeight: "bold", borderBottom: "1px solid #dc2626", color: "#dc2626" }}>{t[lang].chats}</div>
                                            
                                            <div style={{ padding: "10px 15px", borderBottom: "1px solid #333" }}>
                                                <div style={{ display: "flex", alignItems: "center", backgroundColor: "#0a0a0a", border: "1px solid #dc2626", borderRadius: "4px", padding: "5px 10px" }}>
                                                    <span style={{ color: "#888", marginRight: "8px", fontSize: "14px" }}>🔍</span>
                                                    <input type="text" placeholder={t[lang].search} value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} style={{ background: "transparent", border: "none", color: "#fff", outline: "none", width: "100%", fontSize: "13px" }} />
                                                    {searchQuery && <span onClick={() => setSearchQuery("")} style={{ color: "#dc2626", cursor: "pointer", fontWeight: "bold", marginLeft: "5px" }}>×</span>}
                                                </div>
                                            </div>

                                            <div style={{ flex: 1, overflowY: "auto" }}>
                                                {searchQuery.trim() ? (
                                                    <div>
                                                        <div style={{ padding: "10px 15px", fontSize: "11px", color: "#dc2626", fontWeight: "bold", textTransform: "uppercase" }}>{t[lang].globSearch}</div>
                                                        {searchResults.length > 0 ? searchResults.map(u => (
                                                            <div key={u.id} onClick={() => openUserChat(u.id)} style={{ display: "flex", padding: "15px", cursor: "pointer", backgroundColor: "transparent", borderBottom: "1px solid #333" }}>
                                                                <div style={{ position: "relative" }}>
                                                                    <img src={u.avatar} style={{ width: "45px", height: "45px", borderRadius: "50%", marginRight: "15px", border: "1px solid #555", objectFit: "cover" }} />
                                                                    {u.isOnline && <div style={{ position: "absolute", bottom: "0", right: "15px", width: "12px", height: "12px", backgroundColor: "#4ade80", borderRadius: "50%", border: "2px solid #141414" }}></div>}
                                                                </div>
                                                                <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", minWidth: 0 }}>
                                                                    <div style={{ display: "flex", alignItems: "center", flexWrap: "nowrap", overflow: "hidden" }}>
                                                                        <span style={{ fontWeight: "bold", fontSize: "15px", color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "120px" }}>{u.username}</span>
                                                                        <RoleBadge role={u.role} lang={lang} />
                                                                    </div>
                                                                    <div style={{ display: "flex", alignItems: "center", gap: "5px" }}>
                                                                        <span style={{ color: "#888", fontSize: "12px" }}>ID: {u.id}</span>
                                                                        {u.isOnline && <span style={{ color: "#4ade80", fontSize: "11px" }}>• {t[lang].online}</span>}
                                                                    </div>
                                                                </div>
                                                            </div>
                                                        )) : (
                                                            <div style={{ padding: "15px", color: "#888", fontSize: "13px", textAlign: "center" }}>{t[lang].noRes}</div>
                                                        )}
                                                    </div>
                                                ) : (
                                                    <>
                                                        <div onClick={() => setActiveChat("notifications")} style={{ display: "flex", padding: "15px", cursor: "pointer", backgroundColor: activeChat === "notifications" ? "rgba(220,38,38,0.1)" : "transparent", borderBottom: "1px solid #333" }}>
                                                            <img src={NOTIFY_AVATAR} style={{ width: "45px", height: "45px", borderRadius: "50%", marginRight: "15px", border: "1px solid #facc15" }} />
                                                            <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center" }}>
                                                                <span style={{ fontWeight: "bold", fontSize: "15px", color: "#fff" }}>{t[lang].notif}</span>
                                                                <span style={{ fontSize: "13px", color: "#888" }}>{t[lang].sys}</span>
                                                            </div>
                                                        </div>

                                                        <div onClick={() => setActiveChat("support")} style={{ display: "flex", padding: "15px", cursor: "pointer", backgroundColor: activeChat === "support" ? "rgba(220,38,38,0.1)" : "transparent", borderBottom: "1px solid #333" }}>
                                                            <div style={{ position: "relative" }}>
                                                                <img src={SUPPORT_AVATAR} style={{ width: "45px", height: "45px", borderRadius: "50%", marginRight: "15px", border: "1px solid #dc2626" }} />
                                                                <div style={{ position: "absolute", bottom: "0", right: "15px", width: "12px", height: "12px", backgroundColor: "#4ade80", borderRadius: "50%", border: "2px solid #141414" }}></div>
                                                            </div>
                                                            <div style={{ flex: 1, overflow: "hidden", display: "flex", flexDirection: "column", justifyContent: "center" }}>
                                                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "3px" }}>
                                                                    <span style={{ fontWeight: "bold", fontSize: "15px", color: "#fff" }}>{t[lang].support}</span>
                                                                    <span style={{ fontSize: "11px", color: "#4ade80", whiteSpace: "nowrap", marginLeft: "5px" }}>{t[lang].botStatus}</span>
                                                                </div>
                                                                <div style={{ fontSize: "13px", color: "#888", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{t[lang].botHelp}</div>
                                                            </div>
                                                        </div>

                                                        {openedChats.map(userId => {
                                                            const u = usersDatabase.find(x => x.id === userId);
                                                            if(!u) return null;
                                                            return (
                                                                <div key={u.id} onClick={() => setActiveChat(u.id)} style={{ display: "flex", padding: "15px", cursor: "pointer", backgroundColor: activeChat === u.id ? "rgba(220,38,38,0.1)" : "transparent", borderBottom: "1px solid #333" }}>
                                                                    <div style={{ position: "relative" }}>
                                                                        <img src={u.avatar} style={{ width: "45px", height: "45px", borderRadius: "50%", marginRight: "15px", border: "1px solid #555", objectFit: "cover" }} />
                                                                        {u.isOnline && <div style={{ position: "absolute", bottom: "0", right: "15px", width: "12px", height: "12px", backgroundColor: "#4ade80", borderRadius: "50%", border: "2px solid #141414" }}></div>}
                                                                    </div>
                                                                    <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", minWidth: 0 }}>
                                                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "3px" }}>
                                                                            <div style={{ display: "flex", alignItems: "center", minWidth: 0 }}>
                                                                                <span style={{ fontWeight: "bold", fontSize: "15px", color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100px" }}>{u.username}</span>
                                                                                <RoleBadge role={u.role} lang={lang} />
                                                                            </div>
                                                                            {u.isOnline && <span style={{ fontSize: "11px", color: "#4ade80", whiteSpace: "nowrap", marginLeft: "5px", flexShrink: 0 }}>{t[lang].online}</span>}
                                                                        </div>
                                                                        <span style={{ fontSize: "13px", color: blockedByMe.includes(u.id) ? "#ef4444" : "#888" }}>{blockedByMe.includes(u.id) ? t[lang].blocked : t[lang].personal}</span>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                        
                                        {/* ПРАВАЯ КОЛОНКА: ОКНО ДИАЛОГА */}
                                        <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                                            <div style={{ padding: "15px 20px", borderBottom: "1px solid #dc2626", display: "flex", justifyContent: "space-between", alignItems: "center", backgroundColor: "rgba(20,0,0,0.5)" }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: "15px", minWidth: 0 }}>
                                                    {activeChat === "notifications" && <><img src={NOTIFY_AVATAR} style={{ width:"40px", height:"40px", borderRadius:"50%", border:"1px solid #facc15" }}/><div><div style={{fontWeight:"bold", color:"#facc15"}}>{t[lang].notif}</div><div style={{fontSize:"12px", color:"#888"}}>{t[lang].sys}</div></div></>}
                                                    {activeChat === "support" && <><img src={SUPPORT_AVATAR} style={{ width:"40px", height:"40px", borderRadius:"50%", border:"1px solid #dc2626" }}/><div><div style={{fontWeight:"bold", color:"#dc2626"}}>{t[lang].support}</div><div style={{fontSize:"12px", color:"#4ade80"}}>{t[lang].botStatus}</div></div></>}
                                                    {typeof activeChat === "number" && activeUserObj && (
                                                        <>
                                                            <img src={activeUserObj.avatar} style={{ width:"40px", height:"40px", borderRadius:"50%", border:"1px solid #555", objectFit:"cover" }}/>
                                                            <div style={{minWidth: 0}}>
                                                                <div style={{display: "flex", alignItems: "center", minWidth: 0}}>
                                                                    <span style={{fontWeight:"bold", color:"#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "200px"}}>{activeUserObj.username}</span>
                                                                    <RoleBadge role={activeUserObj.role} lang={lang} />
                                                                </div>
                                                                <div style={{ display: "flex", gap: "10px", alignItems: "center" }}>
                                                                    <span style={{fontSize:"12px", color:"#888"}}>ID: {activeUserObj.id}</span>
                                                                    {activeUserObj.isOnline && <span style={{fontSize:"12px", color:"#4ade80"}}>• {t[lang].online}</span>}
                                                                </div>
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                                
                                                <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                                    {/* КНОПКА ОПОВЕЩЕНИЙ И ДАТА РЕГИСТРАЦИИ (Только для личных чатов) */}
                                                    {typeof activeChat === "number" && activeUserObj && (
                                                        <>
                                                            <button onClick={toggleNotifs} style={{ backgroundColor: notifsEnabled ? "rgba(74, 222, 128, 0.2)" : "rgba(255,255,255,0.1)", color: notifsEnabled ? "#4ade80" : "#888", border: notifsEnabled ? "1px solid #4ade80" : "1px solid #555", padding: "6px 12px", borderRadius: "4px", fontSize: "12px", fontWeight: "bold", cursor: "pointer", transition: "0.2s" }}>
                                                                {notifsEnabled ? `✔ ${t[lang].notifOn}` : `🔕 ${t[lang].notifOff}`}
                                                            </button>
                                                            
                                                            <div style={{ textAlign: "right", fontSize: "11px", color: "#888", borderLeft: "1px solid #333", paddingLeft: "15px" }}>
                                                                <div style={{textTransform: "uppercase", marginBottom: "2px"}}>{t[lang].regDateText}</div>
                                                                <div style={{color: "#ccc"}}>{activeUserObj.regDate || "Неизвестно"}</div>
                                                            </div>

                                                            {/* МЕНЮ ТРИ ТОЧКИ */}
                                                            <div style={{ position: "relative" }}>
                                                                <button onClick={() => setChatMenuOpen(!chatMenuOpen)} className="chat-menu-btn" style={{ background: "transparent", color: "#fff", border: "1px solid #555", borderRadius: "4px", padding: "4px 10px", cursor: "pointer", fontSize: "16px" }}>•••</button>
                                                                {chatMenuOpen && (
                                                                    <div style={{ position: "absolute", top: "100%", right: "0", marginTop: "5px", backgroundColor: "#0a0a0a", border: "1px solid #dc2626", borderRadius: "4px", zIndex: 100, width: "150px", overflow: "hidden" }}>
                                                                        <div onClick={() => handleReport(activeUserObj.id)} style={{ padding: "10px", color: "#fff", cursor: "pointer", borderBottom: "1px solid #333", fontSize: "13px" }}>⚠️ {t[lang].report}</div>
                                                                        <div onClick={() => handleBlock(activeUserObj.id)} style={{ padding: "10px", color: "#ef4444", cursor: "pointer", fontSize: "13px" }}>🚫 {t[lang].block}</div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </>
                                                    )}

                                                    {/* КНОПКА СНЯТЬ/ВЫДАТЬ АДМИНКУ (ТОЛЬКО ДЛЯ ВСЕМОГУЩЕГО) */}
                                                    {typeof activeChat === "number" && activeUserObj && currentUser.role === "Всемогущий" && activeUserObj.role !== "Всемогущий" && (
                                                        activeUserObj.role === "АДМИН" ? (
                                                            <button onClick={() => handleRevokeAdmin(activeUserObj.id)} style={{ backgroundColor: "#7f1d1d", color: "#fff", border: "none", padding: "6px 12px", borderRadius: "4px", fontWeight: "bold", cursor: "pointer", boxShadow: "0 0 10px rgba(127,29,29,0.5)", fontSize: "12px" }}>{t[lang].revokeAdmin}</button>
                                                        ) : (
                                                            <button onClick={() => handleGrantAdmin(activeUserObj.id)} style={{ backgroundColor: "#ea580c", color: "#fff", border: "none", padding: "6px 12px", borderRadius: "4px", fontWeight: "bold", cursor: "pointer", boxShadow: "0 0 10px rgba(234,88,12,0.5)", fontSize: "12px" }}>{t[lang].grantAdmin}</button>
                                                        )
                                                    )}
                                                </div>
                                            </div>
                                            
                                            <div style={{ flex: 1, padding: "20px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "20px", fontSize: "14px" }}>
                                                {activeChat === "notifications" && <div style={{ textAlign: "center", color: "#666", paddingTop: "50px" }}>{t[lang].noSysNotif}</div>}
                                                
                                                {activeChat === "support" && (
                                                    <>
                                                        {chatMessages.map((msg, i) => (
                                                            <div key={i} style={{ display: "flex", gap: "15px", alignItems: "flex-start", backgroundColor: msg.sender !== "Бот" ? "rgba(220,38,38,0.05)" : "transparent", padding: msg.sender !== "Бот" ? "12px" : "0", borderRadius: "6px" }}>
                                                                <img src={msg.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #333" }} />
                                                                <div>
                                                                    <span style={{ fontWeight: "bold", color: msg.sender === "Бот" ? "#dc2626" : "#fff" }}>{msg.sender}</span>
                                                                    <span style={{ color: "#666", fontSize: "12px", marginLeft: "10px" }}>{msg.time}</span>
                                                                    <p style={{ margin: "5px 0", color: "#ccc", lineHeight: "1.5", whiteSpace: "pre-line" }}>{msg.text}</p>
                                                                </div>
                                                            </div>
                                                        ))}
                                                        <div style={{ display: "flex", flexWrap: "wrap", gap: "10px", marginTop: "10px" }}>
                                                            {activeButtons.map((catKey, i) => (
                                                                <button key={i} onClick={() => handleSendMessage(catKey, true)} style={{ backgroundColor: "rgba(20,0,0,0.8)", border: "1px solid #dc2626", color: "#fca5a5", padding: "8px 15px", borderRadius: "20px", cursor: "pointer", fontSize: "13px" }}>{t[lang][catKey]}</button>
                                                            ))}
                                                        </div>
                                                    </>
                                                )}

                                                {typeof activeChat === "number" && (
                                                    <>
                                                        {blockedByMe.includes(activeChat) ? (
                                                            <div style={{ textAlign: "center", color: "#ef4444", paddingTop: "50px", fontWeight: "bold" }}>Вы заблокировали этого пользователя.</div>
                                                        ) : activePrivateMessages.length === 0 ? (
                                                            <div style={{ textAlign: "center", color: "#666", paddingTop: "50px" }}>{t[lang].startChat} {activeUserObj?.username}</div>
                                                        ) : (
                                                            activePrivateMessages.map((msg) => {
                                                                const isMe = msg.fromId === currentUser.id;
                                                                const senderInfo = isMe ? currentUser : activeUserObj;
                                                                return (
                                                                    <div key={msg.id || Math.random()} style={{ display: "flex", gap: "15px", alignItems: "flex-start", backgroundColor: isMe ? "rgba(220,38,38,0.1)" : "transparent", padding: isMe ? "12px" : "0", borderRadius: "6px", alignSelf: isMe ? "flex-end" : "flex-start", width: "fit-content", maxWidth: "80%" }}>
                                                                        {!isMe && <img src={senderInfo.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #333" }} />}
                                                                        <div>
                                                                            <div style={{ display: "flex", alignItems: "baseline", gap: "10px" }}>
                                                                                <span style={{ fontWeight: "bold", color: isMe ? "#dc2626" : "#fff" }}>{senderInfo.username}</span>
                                                                                <span style={{ color: "#666", fontSize: "11px" }}>{msg.time}</span>
                                                                            </div>
                                                                            <p style={{ margin: "5px 0", color: "#e5e5e5", lineHeight: "1.5" }}>{msg.text}</p>
                                                                        </div>
                                                                    </div>
                                                                )
                                                            })
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                            
                                            {activeChat !== "notifications" ? (
                                                <div style={{ padding: "15px", borderTop: "1px solid #dc2626", display: "flex", gap: "10px", backgroundColor: "rgba(0,0,0,0.5)" }}>
                                                    <input 
                                                        type="text" placeholder={t[lang].typeMsg} value={typedMessage} onChange={(e) => setTypedMessage(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSendMessage(typedMessage, false)} disabled={typeof activeChat === "number" && blockedByMe.includes(activeChat)}
                                                        style={{ flex: 1, padding: "12px", backgroundColor: "#0a0a0a", border: "1px solid #333", color: "#fff", borderRadius: "4px", outline: "none", opacity: typeof activeChat === "number" && blockedByMe.includes(activeChat) ? 0.5 : 1 }} 
                                                    />
                                                    <button onClick={() => handleSendMessage(typedMessage, false)} disabled={typeof activeChat === "number" && blockedByMe.includes(activeChat)} style={{ padding: "0 25px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold", opacity: typeof activeChat === "number" && blockedByMe.includes(activeChat) ? 0.5 : 1 }}>{t[lang].send}</button>
                                                </div>
                                            ) : (
                                                <div style={{ padding: "15px", borderTop: "1px solid #dc2626", textAlign: "center", color: "#666", fontSize: "13px" }}>{t[lang].sysLock}</div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    {/* НАСТРОЙКИ */}
                    {isSettingsModalOpen && currentUser && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#0a0a0a", padding: "30px", borderRadius: "12px", width: "400px", border: "1px solid #dc2626", boxShadow: "0 0 30px rgba(220,38,38,0.3)" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "20px" }}>
                                    <h3 style={{ margin: 0, color: "#dc2626" }}>{t[lang].settings}</h3>
                                    <button onClick={() => setIsSettingsModalOpen(false)} style={{ background: "none", border: "none", color: "#888", fontSize: "20px", cursor: "pointer" }}>×</button>
                                </div>
                                
                                <div style={{ display: "flex", flexDirection: "column", gap: "15px" }}>
                                    <div>
                                        <label style={{ fontSize: "12px", color: "#888", display: "block", marginBottom: "8px" }}>{t[lang].avatar}</label>
                                        <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                            <img src={inputAvatar || DEFAULT_AVATAR} style={{ width: "50px", height: "50px", borderRadius: "50%", objectFit: "cover", border: "1px solid #dc2626", backgroundColor: "#141414" }} />
                                            <label style={{ backgroundColor: "#f3f4f6", color: "#111827", padding: "8px 16px", borderRadius: "4px", fontWeight: "bold", fontSize: "13px", cursor: "pointer" }}>
                                                {t[lang].changeAv}
                                                <input type="file" accept="image/*" onChange={handleImageUpload} style={{ display: "none" }} />
                                            </label>
                                        </div>
                                    </div>
                                    <input type="email" value={inputEmail} onChange={(e) => setInputEmail(e.target.value)} placeholder="Email" style={{ width: "100%", padding: "10px", backgroundColor: "#141414", border: "1px solid #333", color: "#fff", boxSizing: "border-box" }} />
                                    <input type="text" value={inputPhone} onChange={(e) => setInputPhone(e.target.value)} placeholder="Phone" style={{ width: "100%", padding: "10px", backgroundColor: "#141414", border: "1px solid #333", color: "#fff", boxSizing: "border-box" }} />
                                    
                                    {/* ВЫБОР ЯЗЫКА */}
                                    <div>
                                        <label style={{ fontSize: "12px", color: "#888", display: "block", marginBottom: "8px" }}>{t[lang].langLabel}</label>
                                        <select value={lang} onChange={e => setLang(e.target.value)} style={{ width: "100%", padding: "10px", backgroundColor: "#141414", border: "1px solid #333", color: "#fff", outline: "none", cursor: "pointer" }}>
                                            <option value="ru">Русский 🇷🇺</option>
                                            <option value="en">English 🇬🇧</option>
                                            <option value="uk">Українська 🇺🇦</option>
                                        </select>
                                    </div>

                                    <button onClick={handleSaveSettings} style={{ padding: "12px", backgroundColor: "#dc2626", color: "#fff", border: "none", cursor: "pointer", fontWeight: "bold", marginTop: "10px" }}>{t[lang].save}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* АВТОРИЗАЦИЯ */}
                    {isAuthModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#0a0a0a", padding: "30px", borderRadius: "8px", width: "320px", border: "1px solid #dc2626" }}>
                                <h3 style={{ textAlign: "center", color: "#dc2626" }}>{authMode === "login" ? t[lang].authTitle : t[lang].regTitle}</h3>
                                <p style={{ textAlign: "center", fontSize: "12px", color: "#888", cursor: "pointer", textDecoration: "underline" }} onClick={() => setAuthMode(authMode === "login" ? "register" : "login")}>{authMode === "login" ? t[lang].noAcc : t[lang].hasAcc}</p>
                                <input type="text" placeholder="Login" value={inputUsername} onChange={(e) => setInputUsername(e.target.value.toLowerCase())} style={{ width: "100%", padding: "10px", marginBottom: "10px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box" }} />
                                <input type="password" placeholder="Password" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} style={{ width: "100%", padding: "10px", marginBottom: "20px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box" }} />
                                <button onClick={handleAuth} style={{ width: "100%", padding: "10px", backgroundColor: "#dc2626", color: "#fff", border: "none", fontWeight: "bold", cursor: "pointer" }}>{authMode === "login" ? t[lang].login : t[lang].register}</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLSHOP</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%23660000'/%3E%3Cpath d='M20 50 L20 30 C20 5, 80 5, 80 30 L80 50 L65 50 L65 70 L55 90 L45 90 L35 70 L35 50 Z' fill='%23141414'/%3E%3Cpath d='M30 45 L45 45 L45 65 L55 65 L55 45 L70 45 L70 55 L55 55 L55 75 L45 75 L45 55 L30 55 Z' fill='%23660000'/%3E%3C/svg%3E">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #050000; color: #e5e5e5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #500000; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #dc2626; }
        .bloody-bg { background: linear-gradient(180deg, #1a0000 0%, #050000 100%); min-height: 100vh; }
        .neon-text { text-shadow: 0 0 10px rgba(220, 38, 38, 0.7); }
        .form-input { width: 100%; padding: 12px; background-color: #0a0a0a; border: 1px solid #333; color: #fff; border-radius: 4px; outline: none; box-sizing: border-box; font-family: inherit; margin-bottom: 20px; }
        .form-input:focus { border-color: #dc2626; }
        .kb-folder { background: rgba(20,0,0,0.6); border: 1px solid #333; border-radius: 6px; padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; display: flex; justify-content: space-between; }
        .kb-folder:hover { background: rgba(220,38,38,0.1); border-color: #dc2626; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyAkyn8tkiPyZOBaI0rCTIDAdNGOJjl_dgs",
            authDomain: "hellshop-132fe.firebaseapp.com",
            databaseURL: "https://hellshop-132fe-default-rtdb.firebaseio.com",
            projectId: "hellshop-132fe",
            storageBucket: "hellshop-132fe.appspot.com",
            messagingSenderId: "863558594124",
            appId: "1:863558594124:web:46998a47434e95e7b08ee9"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const DEFAULT_AVATAR = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23660000"/><path d="M20 50 L20 30 C20 5, 80 5, 80 30 L80 50 L65 50 L65 70 L55 90 L45 90 L35 70 L35 50 Z" fill="%23141414"/><path d="M30 45 L45 45 L45 65 L55 65 L55 45 L70 45 L70 55 L55 55 L55 75 L45 75 L45 55 L30 55 Z" fill="%23660000"/></svg>`;
        const SUPPORT_AVATAR = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23141414"/><path d="M50 15 L25 35 L25 65 L50 85 L75 65 L75 35 Z" fill="%23dc2626"/><circle cx="50" cy="45" r="10" fill="%23141414"/><path d="M35 70 C 35 55, 65 55, 65 70 Z" fill="%23141414"/></svg>`;
        const NOTIFY_AVATAR = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23141414"/><path d="M50 20 C35 20, 30 35, 30 50 L25 70 L75 70 L70 50 C70 35, 65 20, 50 20 Z" fill="%23facc15"/><circle cx="50" cy="80" r="7" fill="%23facc15"/></svg>`;

        const t = {
            ru: { purchases: "Покупки", sales: "Продажи", messages: "Сообщения", finances: "Финансы", kb: "База знаний", tickets: "Заявки", search: "Найти по ID...", lang: "Язык" },
            en: { purchases: "Purchases", sales: "Sales", messages: "Messages", finances: "Finances", kb: "Knowledge Base", tickets: "Tickets", search: "Search ID...", lang: "Language" },
            uk: { purchases: "Покупки", sales: "Продажі", messages: "Повідомлення", finances: "Фінанси", kb: "База знань", tickets: "Заявки", search: "Знайти за ID...", lang: "Мова" }
        };

        const mainCategories = ["🛒 Для покупателей", "🤑 Для продавцов", "💰 Баланс и выплаты", "🔒 Безопасность", "📜 Правила сайта", "🐛 Нашел баг"];
        const buyerCategories = ["🔙 Назад", "❓ Как проходит сделка?", "📦 Способы получения", "💬 Чат с продавцом", "💡 Советы", "💳 Оплата товаров", "✅ Гарантии и возврат", "⭐ Отзывы"];

        function RoleBadge({ role }) {
            if (role === "Всемогущий") return <span style={{ background: "linear-gradient(45deg, #dc2626, #7f1d1d)", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "10px", fontWeight: "bold", marginLeft: "8px", whiteSpace: "nowrap" }}>ВСЕМОГУЩИЙ</span>;
            if (role === "АДМИН") return <span style={{ background: "#ea580c", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "10px", fontWeight: "bold", marginLeft: "8px", whiteSpace: "nowrap" }}>АДМИН</span>;
            return null;
        }

        function App() {
            const [usersDatabase, setUsersDatabase] = React.useState([]);
            const [privateMessages, setPrivateMessages] = React.useState([]);
            const [tickets, setTickets] = React.useState([]);
            const [ticketMessages, setTicketMessages] = React.useState([]);
            const [lang, setLang] = React.useState(() => localStorage.getItem("hellshop_lang") || "ru");
            const [notifsEnabled, setNotifsEnabled] = React.useState(() => localStorage.getItem("hellshop_notifs") === "true");

            const [currentUser, setCurrentUser] = React.useState(() => {
                const saved = localStorage.getItem("hellshop_currentUser");
                return saved ? JSON.parse(saved) : null;
            });

            // Локальные состояния для чистых чатов
            const [chatMessages, setChatMessages] = React.useState([]);
            const [openedChats, setOpenedChats] = React.useState([]);
            const [supportMenu, setSupportMenu] = React.useState("main");

            // Инициализация при входе
            React.useEffect(() => {
                if (currentUser) {
                    const savedChats = localStorage.getItem("hs_opened_" + currentUser.id);
                    setOpenedChats(savedChats ? JSON.parse(savedChats) : []);
                    const savedMsgs = localStorage.getItem("hs_support_" + currentUser.id);
                    setChatMessages(savedMsgs ? JSON.parse(savedMsgs) : [{ sender: "Бот", avatar: SUPPORT_AVATAR, text: "Бот поддержки HellShop поможет тебе найти ответ на важные вопросы!\n\nНажимай на кнопки ниже, чтобы выбрать тему своего обращения.", time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
                    setSupportMenu(localStorage.getItem("hs_menu_" + currentUser.id) || "main");
                } else {
                    setOpenedChats([]); setChatMessages([]); setSupportMenu("main");
                }
            }, [currentUser?.id]);

            // Сохранение состояний
            React.useEffect(() => {
                if (currentUser) {
                    localStorage.setItem("hs_opened_" + currentUser.id, JSON.stringify(openedChats));
                    localStorage.setItem("hs_support_" + currentUser.id, JSON.stringify(chatMessages));
                    localStorage.setItem("hs_menu_" + currentUser.id, supportMenu);
                }
            }, [openedChats, chatMessages, supportMenu, currentUser?.id]);
            React.useEffect(() => { localStorage.setItem("hellshop_lang", lang); }, [lang]);
            React.useEffect(() => { localStorage.setItem("hellshop_notifs", notifsEnabled); }, [notifsEnabled]);

            // FIREBASE
            React.useEffect(() => {
                db.ref('users').on('value', snap => setUsersDatabase(Object.values(snap.val() || {})));
                db.ref('privateMessages').on('value', snap => setPrivateMessages(Object.values(snap.val() || {})));
                db.ref('ticketMessages').on('value', snap => setTicketMessages(Object.values(snap.val() || {})));
                
                db.ref('tickets').on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const now = Date.now();
                        const valid = [];
                        Object.entries(data).forEach(([key, t]) => {
                            if (now - t.timestamp > 12 * 60 * 60 * 1000) db.ref('tickets/' + key).remove(); // Автоудаление 12 часов
                            else valid.push({ ...t, firebaseKey: key });
                        });
                        setTickets(valid.reverse());
                    } else setTickets([]);
                });
            }, []);

            // Авто-добавление в список чатов
            React.useEffect(() => {
                if (!currentUser) return;
                setOpenedChats(prev => {
                    let updated = [...prev];
                    let changed = false;
                    privateMessages.forEach(msg => {
                        if (msg.toId === currentUser.id && !updated.includes(msg.fromId)) { updated.unshift(msg.fromId); changed = true; }
                        if (msg.fromId === currentUser.id && !updated.includes(msg.toId)) { updated.unshift(msg.toId); changed = true; }
                    });
                    return changed ? updated : prev;
                });
            }, [privateMessages, currentUser]);

            React.useEffect(() => {
                if (currentUser && usersDatabase.length > 0) {
                    const updatedMe = usersDatabase.find(u => u.id === currentUser.id);
                    if (updatedMe && JSON.stringify(updatedMe) !== JSON.stringify(currentUser)) {
                        setCurrentUser(updatedMe); localStorage.setItem("hellshop_currentUser", JSON.stringify(updatedMe));
                    }
                }
            }, [usersDatabase, currentUser]);

            React.useEffect(() => {
                if (currentUser) {
                    const userRef = db.ref('users/' + currentUser.id);
                    userRef.update({ isOnline: true });
                    userRef.onDisconnect().update({ isOnline: false });
                }
            }, [currentUser]);

            // СОСТОЯНИЯ UI
            const [activePage, setActivePage] = React.useState("messages"); 
            const [activeChat, setActiveChat] = React.useState("support"); 
            const [chatMenuOpen, setChatMenuOpen] = React.useState(false); 
            const [isAuthModalOpen, setIsAuthModalOpen] = React.useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = React.useState(false);
            const [authMode, setAuthMode] = React.useState("login");
            const [inputUsername, setInputUsername] = React.useState("");
            const [inputPassword, setInputPassword] = React.useState("");
            const [typedMessage, setTypedMessage] = React.useState("");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [inputAvatar, setInputAvatar] = React.useState("");

            // ТИКЕТЫ & БАЗА ЗНАНИЙ
            const [ticketCat, setTicketCat] = React.useState("");
            const [ticketOrder, setTicketOrder] = React.useState("");
            const [ticketRole, setTicketRole] = React.useState("buyer");
            const [ticketText, setTicketText] = React.useState("");
            const [activeTicketId, setActiveTicketId] = React.useState(null);
            const [kbView, setKbView] = React.useState("main"); // main, folder1, article1

            const isAdmin = currentUser?.role === "Всемогущий" || currentUser?.role === "АДМИН";
            const isGod = currentUser?.role === "Всемогущий";

            const handleAuth = () => {
                if (!inputUsername.trim() || !inputPassword.trim()) return;
                if (authMode === "register") {
                    if (usersDatabase.find(u => u.username === inputUsername)) return alert("Ник занят!");
                    const isFirstUser = usersDatabase.length === 0;
                    const maxId = isFirstUser ? 100000 : Math.max(...usersDatabase.map(u => u.id || 100000));
                    const newId = maxId + 1; 
                    
                    const dateObj = new Date();
                    const formattedDate = dateObj.toLocaleDateString('ru-RU', {day: '2-digit', month: 'short', year: 'numeric'}) + ", " + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const newUser = { id: newId, username: inputUsername, password: inputPassword, avatar: DEFAULT_AVATAR, role: isFirstUser ? "Всемогущий" : "Пользователь", isOnline: true, regDate: formattedDate, blocked: [] };
                    db.ref('users/' + newId).set(newUser);
                    setCurrentUser(newUser); 
                    localStorage.setItem("hellshop_currentUser", JSON.stringify(newUser));
                    
                    setOpenedChats([]); // Очищаем для новорега
                    setIsAuthModalOpen(false);
                } else {
                    const user = usersDatabase.find(u => u.username === inputUsername && u.password === inputPassword);
                    if (user) { 
                        setCurrentUser(user); localStorage.setItem("hellshop_currentUser", JSON.stringify(user));
                        db.ref('users/' + user.id).update({ isOnline: true }); setIsAuthModalOpen(false); 
                    } else alert("Неверный логин или пароль!");
                }
                setInputUsername(""); setInputPassword("");
            };

            const handleLogout = () => {
                if (currentUser) db.ref('users/' + currentUser.id).update({ isOnline: false });
                setCurrentUser(null); localStorage.removeItem("hellshop_currentUser");
                setActivePage("messages");
            };

            const openUserChat = (userId) => {
                if (!currentUser) return;
                if (!openedChats.includes(userId)) setOpenedChats([userId, ...openedChats]);
                setActiveChat(userId); setActivePage("messages"); setSearchQuery(""); 
            };

            const handleBlock = (userId) => {
                setChatMenuOpen(false);
                const currentBlocked = currentUser.blocked || [];
                if (!currentBlocked.includes(userId)) {
                    db.ref('users/' + currentUser.id).update({ blocked: [...currentBlocked, userId] });
                    alert("Пользователь заблокирован.");
                }
            };

            const submitTicket = () => {
                if (!ticketCat || !ticketText.trim()) return alert("Заполните категорию и описание!");
                const newTicket = {
                    id: Date.now().toString(), fromId: currentUser.id, username: currentUser.username,
                    category: ticketCat, orderNum: ticketOrder, roleType: ticketRole, status: "new", assignee: null,
                    timestamp: Date.now(), dateStr: new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: 'short'}) + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };
                db.ref('tickets').push(newTicket);
                db.ref('ticketMessages').push({ ticketId: newTicket.id, sender: currentUser.username, avatar: currentUser.avatar, text: ticketText, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
                alert("Заявка создана!"); setTicketCat(""); setTicketOrder(""); setTicketText(""); setActivePage("tickets");
            };

            const sendTicketMsg = () => {
                if (!typedMessage.trim() || !activeTicketId) return;
                db.ref('ticketMessages').push({ ticketId: activeTicketId, sender: currentUser.username, avatar: currentUser.avatar, text: typedMessage, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
                setTypedMessage("");
            };

            const handleSendMessage = (text = typedMessage) => {
                if (!text.trim()) return;
                const currentTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (activeChat === "support") {
                    if (text === "🔙 Назад") { setSupportMenu("main"); return; }
                    const newMsg = { sender: currentUser ? currentUser.username : "Вы", avatar: currentUser ? currentUser.avatar : DEFAULT_AVATAR, text: text, time: currentTime };
                    let updatedMessages = [...chatMessages, newMsg];
                    let botReplyText = ""; let newMenu = supportMenu;

                    if (text === "🛒 Для покупателей") { botReplyText = "HellShop — это маркетплейс.\nКак купить товар?\n1️⃣ Нажмите «Купить»;\n2️⃣ Выберите способ оплаты;\n3️⃣ Следуйте инструкции."; newMenu = "buyers"; } 
                    else if (text === "🤑 Для продавцов") { botReplyText = "Хотите начать продавать?\n1. Регистрация.\n2. Создайте объявление.\n3. Ожидайте покупателей!"; } 
                    else if (text === "💰 Баланс и выплаты") { botReplyText = "Выплаты производятся на карты и крипту."; } 
                    else if (text === "🔒 Безопасность") { botReplyText = "НИКОГДА не переходите в Telegram. Общайтесь только в чате HellShop."; } 
                    else if (text === "📜 Правила сайта") { botReplyText = "Нарушение = вечная блокировка."; } 
                    else if (text === "🐛 Нашел баг") { botReplyText = "Опишите ошибку, мы её исправим."; }
                    else if (text === "❓ Как проходит сделка?") { botReplyText = "1️⃣ Оплата в резерв.\n2️⃣ Продавец выдаёт товар.\n3️⃣ Подтверждаете заказ."; }
                    else if (text === "📦 Способы получения") { botReplyText = "Автоматически, через трейд или лично в чате."; }
                    else if (text === "💬 Чат с продавцом") { botReplyText = "После оплаты откроется чат с продавцом."; }
                    else if (text === "💡 Советы") { botReplyText = "Снимайте процесс покупки на видео!"; }
                    else if (text === "💳 Оплата товаров") { botReplyText = "Принимаем карты РФ, мира, СБП и крипту."; }
                    else if (text === "✅ Гарантии и возврат") { botReplyText = "Спор = возврат денег при обмане."; }
                    else if (text === "⭐ Отзывы") { botReplyText = "Оставляйте отзывы после сделки!"; }

                    if (botReplyText) updatedMessages.push({ sender: "Бот", avatar: SUPPORT_AVATAR, text: botReplyText, time: currentTime });
                    setChatMessages(updatedMessages); if (newMenu !== supportMenu) setSupportMenu(newMenu);
                } 
                else if (typeof activeChat === "number") {
                    db.ref('privateMessages').push({ fromId: currentUser.id, toId: activeChat, text: text, time: currentTime });
                }
                setTypedMessage("");
            };

            const renderTable = (headers) => (
                <div style={{ backgroundColor: "rgba(20, 20, 20, 0.8)", borderRadius: "8px", overflow: "hidden", border: "1px solid #dc2626", marginTop: "20px" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: "14px" }}>
                        <thead style={{ backgroundColor: "rgba(40, 0, 0, 0.6)", borderBottom: "1px solid #dc2626" }}>
                            <tr>{headers.map((h, i) => <th key={i} style={{ padding: "15px", color: "#fca5a5" }}>{h}</th>)}</tr>
                        </thead>
                        <tbody><tr><td colSpan={headers.length} style={{ padding: "30px", textAlign: "center", color: "#888" }}>История пуста.</td></tr></tbody>
                    </table>
                </div>
            );

            const activeUserObj = typeof activeChat === "number" ? usersDatabase.find(u => u.id === activeChat) : null;
            const blockedByMe = currentUser?.blocked || [];
            const activePrivateMessages = activeUserObj ? privateMessages.filter(m => ((m.fromId === currentUser?.id && m.toId === activeUserObj.id) || (m.fromId === activeUserObj.id && m.toId === currentUser?.id)) && !blockedByMe.includes(m.fromId)) : [];
            const activeTicketObj = tickets.find(t => t.id === activeTicketId);
            const activeTicketMsgs = ticketMessages.filter(m => m.ticketId === activeTicketId);

            return (
                <div className="bloody-bg">
                    {/* ШАПКА */}
                    <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 30px", height: "70px", backgroundColor: "rgba(10, 0, 0, 0.9)", borderBottom: "2px solid #dc2626", boxShadow: "0 4px 15px rgba(220, 38, 38, 0.2)" }}>
                        <div onClick={() => setActivePage("messages")} className="neon-text" style={{ fontSize: "24px", fontWeight: "900", color: "#dc2626", cursor: "pointer", letterSpacing: "1px" }}>HELL<span style={{ color: "#fff" }}>SHOP</span></div>

                        <div style={{ display: "flex", alignItems: "center", gap: "25px" }}>
                            <div style={{ display: "flex", gap: "20px", fontSize: "14px", fontWeight: "500" }}>
                                {["purchases", "sales", "messages", "finances", "kb", "tickets"].map(page => {
                                    const pageKeys = { purchases: "Покупки", sales: "Продажи", messages: "Сообщения", finances: "Финансы", kb: "База знаний", tickets: "Заявки" };
                                    const tName = t[lang]?.[page] || pageKeys[page];
                                    const isActive = activePage === page || (page==='tickets' && (activePage==='createTicket' || activePage==='viewTicket'));
                                    return (
                                        <span key={page} onClick={() => { setActivePage(page); if(page==='tickets') setActiveTicketId(null); if(page==='kb') setKbView('main'); }} style={{ cursor: "pointer", transition: "0.2s", color: isActive ? "#dc2626" : "#a3a3a3", borderBottom: isActive ? "2px solid #dc2626" : "none", paddingBottom: "23px", paddingTop: "25px" }}>
                                            {tName}
                                        </span>
                                    )
                                })}
                            </div>

                            <div style={{ position: "relative" }}>
                                {currentUser ? (
                                    <div onClick={() => setIsSettingsModalOpen(true)} style={{ display: "flex", alignItems: "center", gap: "8px", cursor: "pointer" }}>
                                        <div style={{ position: "relative" }}>
                                            <img src={currentUser.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #dc2626", backgroundColor: "#141414" }} />
                                            <div style={{ position: "absolute", bottom: "0", right: "0", width: "8px", height: "8px", backgroundColor: "#4ade80", borderRadius: "50%", border: "1px solid #141414" }}></div>
                                        </div>
                                    </div>
                                ) : (
                                    <button onClick={() => { setAuthMode("login"); setIsAuthModalOpen(true); }} style={{ backgroundColor: "#dc2626", color: "#fff", border: "none", padding: "8px 16px", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>Войти</button>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* ОСНОВНОЙ КОНТЕНТ */}
                    <main style={{ padding: "40px 50px", maxWidth: "1200px", margin: "0 auto" }}>
                        {!currentUser ? (
                            <div style={{ textAlign: "center", padding: "100px 0" }}><h2 style={{ color: "#dc2626" }}>ДОСТУП ЗАКРЫТ 🔒</h2><button onClick={() => setIsAuthModalOpen(true)} style={{ marginTop: "20px", padding: "10px 20px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>Войти в аккаунт</button></div>
                        ) : (
                            <>
                                {activePage === "purchases" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>Мои покупки</h1>{renderTable(["Дата", "Заказ", "Описание", "Продавец", "Статус", "Сумма"])}</div>)}
                                {activePage === "sales" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>Мои продажи</h1>{renderTable(["Дата", "Заказ", "Описание", "Покупатель", "Статус", "Сумма"])}</div>)}

                                                            <img src={activeUserObj.avatar} style={{ width:"40px", height:"40px", borderRadius:"50%", border:"1px solid #555", objectFit:"cover" }}/>
                                                            <div style={{minWidth: 0}}>
                                                                <div style={{display: "flex", alignItems: "center", minWidth: 0}}><span style={{fontWeight:"bold", color:"#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "200px"}}>{activeUserObj.username}</span><RoleBadge role={activeUserObj.role} /></div>
                                                                <div style={{ display: "flex", gap: "10px", alignItems: "center" }}><span style={{fontSize:"12px", color:"#888"}}>ID: {activeUserObj.id}</span>{activeUserObj.isOnline && <span style={{fontSize:"12px", color:"#4ade80"}}>• В сети</span>}</div>
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                                
                                                <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                                    {typeof activeChat === "number" && activeUserObj && (
                                                        <>
                                                            <button onClick={() => { if(!notifsEnabled) { Notification.requestPermission().then(p => { if(p==="granted") setNotifsEnabled(true); }); } else setNotifsEnabled(false); }} style={{ backgroundColor: notifsEnabled ? "rgba(74, 222, 128, 0.2)" : "rgba(255,255,255,0.1)", color: notifsEnabled ? "#4ade80" : "#888", border: notifsEnabled ? "1px solid #4ade80" : "1px solid #555", padding: "6px 12px", borderRadius: "4px", fontSize: "12px", fontWeight: "bold", cursor: "pointer" }}>
                                                                {notifsEnabled ? `✔ Включены оповещения` : `🔕 Оповещения выключены`}
                                                            </button>
                                                            <div style={{ textAlign: "right", fontSize: "11px", color: "#888", borderLeft: "1px solid #333", paddingLeft: "15px" }}>
                                                                <div style={{textTransform: "uppercase", marginBottom: "2px"}}>Дата регистрации</div><div style={{color: "#ccc"}}>{activeUserObj.regDate || "Неизвестно"}</div>
                                                            </div>
                                                            <div style={{ position: "relative" }}>
                                                                <button onClick={() => setChatMenuOpen(!chatMenuOpen)} className="chat-menu-btn" style={{ background: "transparent", color: "#fff", border: "1px solid #555", borderRadius: "4px", padding: "4px 10px", cursor: "pointer", fontSize: "16px" }}>•••</button>
                                                                {chatMenuOpen && (
                                                                    <div style={{ position: "absolute", top: "100%", right: "0", marginTop: "5px", backgroundColor: "#0a0a0a", border: "1px solid #dc2626", borderRadius: "4px", zIndex: 100, width: "150px", overflow: "hidden" }}>
                                                                        <div onClick={() => { setActivePage("createTicket"); setChatMenuOpen(false); }} style={{ padding: "10px", color: "#fff", cursor: "pointer", borderBottom: "1px solid #333", fontSize: "13px" }}>⚠️ Пожаловаться</div>
                                                                        <div onClick={() => handleBlock(activeUserObj.id)} style={{ padding: "10px", color: "#ef4444", cursor: "pointer", fontSize: "13px" }}>🚫 Заблокировать</div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </>
                                                    )}
                                                    {typeof activeChat === "number" && activeUserObj && isGod && activeUserObj.role !== "Всемогущий" && (
                                                        activeUserObj.role === "АДМИН" ? (
                                                            <button onClick={() => { if(window.confirm("Снять?")) db.ref('users/' + activeUserObj.id).update({role: "Пользователь"}); }} style={{ backgroundColor: "#7f1d1d", color: "#fff", border: "none", padding: "6px 12px", borderRadius: "4px", fontWeight: "bold", cursor: "pointer" }}>Снять АДМИНА</button>
                                                        ) : (
                                                            <button onClick={() => { if(window.confirm("Выдать?")) db.ref('users/' + activeUserObj.id).update({role: "АДМИН"}); }} style={{ backgroundColor: "#ea580c", color: "#fff", border: "none", padding: "6px 12px", borderRadius: "4px", fontWeight: "bold", cursor: "pointer" }}>Выдать АДМИНА</button>
                                                        )
                                                    )}
                                                </div>
                                            </div>
                                            
                                            <div style={{ flex: 1, padding: "20px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "20px", fontSize: "14px" }}>
                                                {activeChat === "notifications" && <div style={{ textAlign: "center", color: "#666", paddingTop: "50px" }}>Нет системных уведомлений.</div>}
                                                {activeChat === "support" && (
                                                    <>
                                                        {chatMessages.map((msg, i) => (
                                                            <div key={i} style={{ display: "flex", gap: "15px", alignItems: "flex-start", backgroundColor: msg.sender !== "Бот" ? "rgba(220,38,38,0.05)" : "transparent", padding: msg.sender !== "Бот" ? "12px" : "0", borderRadius: "6px" }}>
                                                                <img src={msg.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #333" }} />
                                                                <div>
                                                                    <span style={{ fontWeight: "bold", color: msg.sender === "Бот" ? "#dc2626" : "#fff" }}>{msg.sender}</span><span style={{ color: "#666", fontSize: "12px", marginLeft: "10px" }}>{msg.time}</span>
                                                                    <p style={{ margin: "5px 0", color: "#ccc", lineHeight: "1.5", whiteSpace: "pre-line" }}>{msg.text}</p>
                                                                </div>
                                                            </div>
                                                        ))}
                                                        <div style={{ display: "flex", flexWrap: "wrap", gap: "10px", marginTop: "10px" }}>
                                                            {(supportMenu === "main" ? mainCategories : buyerCategories).map((cat, i) => <button key={i} onClick={() => handleSendMessage(cat)} style={{ backgroundColor: "rgba(20,0,0,0.8)", border: "1px solid #dc2626", color: "#fca5a5", padding: "8px 15px", borderRadius: "20px", cursor: "pointer", fontSize: "13px" }}>{cat}</button> )}
                                                        </div>
                                                    </>
                                                )}
                                                {typeof activeChat === "number" && (
                                                    <>
                                                        {blockedByMe.includes(activeChat) ? (
                                                            <div style={{ textAlign: "center", color: "#ef4444", paddingTop: "50px", fontWeight: "bold" }}>Вы заблокировали этого пользователя.</div>
                                                        ) : activePrivateMessages.length === 0 ? (
                                                            <div style={{ textAlign: "center", color: "#666", paddingTop: "50px" }}>Начните переписку с {activeUserObj?.username}</div>
                                                        ) : (
                                                            activePrivateMessages.map((msg) => {
                                                                const isMe = msg.fromId === currentUser.id;
                                                                const senderInfo = isMe ? currentUser : activeUserObj;
                                                                return (
                                                                    <div key={msg.id || Math.random()} style={{ display: "flex", gap: "15px", alignItems: "flex-start", backgroundColor: isMe ? "rgba(220,38,38,0.1)" : "transparent", padding: isMe ? "12px" : "0", borderRadius: "6px", alignSelf: isMe ? "flex-end" : "flex-start", width: "fit-content", maxWidth: "80%" }}>
                                                                        {!isMe && <img src={senderInfo.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #333" }} />}
                                                                        <div>
                                                                            <div style={{ display: "flex", alignItems: "baseline", gap: "10px" }}><span style={{ fontWeight: "bold", color: isMe ? "#dc2626" : "#fff" }}>{senderInfo.username}</span><span style={{ color: "#666", fontSize: "11px" }}>{msg.time}</span></div>
                                                                            <p style={{ margin: "5px 0", color: "#e5e5e5", lineHeight: "1.5" }}>{msg.text}</p>
                                                                        </div>
                                                                    </div>
                                                                )
                                                            })
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                            
                                            {activeChat !== "notifications" ? (
                                                <div style={{ padding: "15px", borderTop: "1px solid #dc2626", display: "flex", gap: "10px", backgroundColor: "rgba(0,0,0,0.5)" }}>
                                                    <input type="text" placeholder="Введите сообщение..." value={typedMessage} onChange={(e) => setTypedMessage(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()} disabled={typeof activeChat === "number" && blockedByMe.includes(activeChat)} style={{ flex: 1, padding: "12px", backgroundColor: "#0a0a0a", border: "1px solid #333", color: "#fff", borderRadius: "4px", outline: "none", opacity: typeof activeChat === "number" && blockedByMe.includes(activeChat) ? 0.5 : 1 }} />
                                                    <button onClick={() => handleSendMessage()} disabled={typeof activeChat === "number" && blockedByMe.includes(activeChat)} style={{ padding: "0 25px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold", opacity: typeof activeChat === "number" && blockedByMe.includes(activeChat) ? 0.5 : 1 }}>Отправить</button>
                                                </div>
                                            ) : (
                                                <div style={{ padding: "15px", borderTop: "1px solid #dc2626", textAlign: "center", color: "#666", fontSize: "13px" }}>Системный чат. Отправка сообщений запрещена.</div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    {/* НАСТРОЙКИ */}
                    {isSettingsModalOpen && currentUser && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#0a0a0a", padding: "30px", borderRadius: "12px", width: "400px", border: "1px solid #dc2626", boxShadow: "0 0 30px rgba(220,38,38,0.3)" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "20px" }}>
                                    <h3 style={{ margin: 0, color: "#dc2626" }}>Настройки аккаунта</h3>
                                    <button onClick={() => setIsSettingsModalOpen(false)} style={{ background: "none", border: "none", color: "#888", fontSize: "20px", cursor: "pointer" }}>×</button>
                                </div>
                                
                                <div style={{ display: "flex", flexDirection: "column", gap: "15px" }}>
                                    <div>
                                        <label style={{ fontSize: "12px", color: "#888", display: "block", marginBottom: "8px" }}>Аватарка профиля</label>
                                        <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                            <img src={inputAvatar || DEFAULT_AVATAR} style={{ width: "50px", height: "50px", borderRadius: "50%", objectFit: "cover", border: "1px solid #dc2626", backgroundColor: "#141414" }} />
                                            <label style={{ backgroundColor: "#f3f4f6", color: "#111827", padding: "8px 16px", borderRadius: "4px", fontWeight: "bold", fontSize: "13px", cursor: "pointer" }}>
                                                Изменить
                                                <input type="file" accept="image/*" onChange={handleImageUpload} style={{ display: "none" }} />
                                            </label>
                                        </div>
                                    </div>
                                    <div style={{ display: "flex", justifyContent: "space-between", marginTop: "10px" }}>
                                        <button onClick={handleLogout} style={{ padding: "12px", backgroundColor: "transparent", color: "#ef4444", border: "1px solid #ef4444", cursor: "pointer", fontWeight: "bold", borderRadius: "4px" }}>Выйти из аккаунта</button>
                                        <button onClick={() => {
                                            const updatedUser = { ...currentUser, avatar: inputAvatar.trim() ? inputAvatar : DEFAULT_AVATAR };
                                            db.ref('users/' + currentUser.id).update(updatedUser);
                                            setIsSettingsModalOpen(false);
                                        }} style={{ padding: "12px", backgroundColor: "#dc2626", color: "#fff", border: "none", cursor: "pointer", fontWeight: "bold", borderRadius: "4px" }}>Сохранить</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* АВТОРИЗАЦИЯ */}
                    {isAuthModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#0a0a0a", padding: "30px", borderRadius: "8px", width: "320px", border: "1px solid #dc2626" }}>
                                <h3 style={{ textAlign: "center", color: "#dc2626" }}>{authMode === "login" ? "Авторизация" : "Регистрация"}</h3>
                                <p style={{ textAlign: "center", fontSize: "12px", color: "#888", cursor: "pointer", textDecoration: "underline" }} onClick={() => setAuthMode(authMode === "login" ? "register" : "login")}>{authMode === "login" ? "Нет аккаунта? Создать" : "Есть аккаунт? Войти"}</p>
                                <input type="text" placeholder="Логин" value={inputUsername} onChange={(e) => setInputUsername(e.target.value.toLowerCase())} style={{ width: "100%", padding: "10px", marginBottom: "10px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box" }} />
                                <input type="password" placeholder="Пароль" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} style={{ width: "100%", padding: "10px", marginBottom: "20px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box" }} />
                                <button onClick={handleAuth} style={{ width: "100%", padding: "10px", backgroundColor: "#dc2626", color: "#fff", border: "none", fontWeight: "bold", cursor: "pointer" }}>{authMode === "login" ? "Войти" : "Продолжить"}</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLSHOP</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background-color: #0a0a0a; color: #e5e5e5; font-family: sans-serif;">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // Состояние настроек
            const [email, setEmail] = React.useState(() => localStorage.getItem("h_email") || "");
            const [phone, setPhone] = React.useState(() => localStorage.getItem("h_phone") || "");
            const [isSettingsOpen, setIsSettingsOpen] = React.useState(false);

            const saveSettings = () => {
                localStorage.setItem("h_email", email);
                localStorage.setItem("h_phone", phone);
                alert("✅ Данные сохранены!");
                setIsSettingsOpen(false);
            };

            return (
                <div style={{ minHeight: "100vh" }}>
                    {/* Кровавая шапка */}
                    <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 30px", height: "70px", backgroundColor: "#141414", borderBottom: "2px solid #dc2626" }}>
                        <div style={{ fontSize: "24px", fontWeight: "900", color: "#dc2626" }}>HELLSHOP</div>
                        <div style={{ display: "flex", gap: "20px", color: "#a3a3a3" }}>
                            <span>Главная</span><span>Покупки</span><span>Сообщения</span><span>Финансы</span>
                            <button onClick={() => setIsSettingsOpen(true)} style={{ background: "#dc2626", border: "none", color: "#fff", padding: "5px 10px", cursor: "pointer", borderRadius: "4px" }}>Настройки</button>
                        </div>
                    </header>

                    {/* Контент */}
                    <main style={{ padding: "50px" }}>
                        <h1>main</h1>
                        <div style={{ padding: "20px", border: "1px solid #dc2626", borderRadius: "8px", backgroundColor: "#141414" }}>
                            Добро пожаловать в адский магазин. Здесь продается лучший софт и скрипты.
                        </div>
                    </main>

                    {/* Модалка настроек */}
                    {isSettingsOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.8)", display: "flex", justifyContent: "center", alignItems: "center" }}>
                            <div style={{ backgroundColor: "#141414", padding: "30px", border: "1px solid #dc2626", borderRadius: "8px", width: "300px" }}>
                                <h3>Настройки аккаунта</h3>
                                <input placeholder="Почта" value={email} onChange={e => setEmail(e.target.value)} style={{ width: "100%", padding: "10px", margin: "10px 0", backgroundColor: "#0a0a0a", border: "1px solid #333", color: "#fff" }} />
                                <input placeholder="Телефон" value={phone} onChange={e => setPhone(e.target.value)} style={{ width: "100%", padding: "10px", margin: "10px 0", backgroundColor: "#0a0a0a", border: "1px solid #333", color: "#fff" }} />
                                <button onClick={saveSettings} style={{ width: "100%", padding: "10px", backgroundColor: "#dc2626", color: "#fff", border: "none", cursor: "pointer" }}>Сохранить</button>
                                <button onClick={() => setIsSettingsOpen(false)} style={{ width: "100%", padding: "10px", marginTop: "10px", backgroundColor: "#333", color: "#fff", border: "none", cursor: "pointer" }}>Закрыть</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

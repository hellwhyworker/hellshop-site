<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HELLSHOP</title>
    <!-- Подключаем React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background-color: #0a0a0a; color: #e5e5e5; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div id="root"></div>

    <script type="text/babel">
        const DEFAULT_AVATAR = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23660000"/><path d="M20 50 L20 30 C20 5, 80 5, 80 30 L80 50 L65 50 L65 70 L55 90 L45 90 L35 70 L35 50 Z" fill="%23141414"/><path d="M30 45 L45 45 L45 65 L55 65 L55 45 L70 45 L70 55 L55 55 L55 75 L45 75 L45 55 L30 55 Z" fill="%23660000"/></svg>`;
        const SUPPORT_AVATAR = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23141414"/><path d="M50 15 L25 35 L25 65 L50 85 L75 65 L75 35 Z" fill="%23dc2626"/><circle cx="50" cy="45" r="10" fill="%23141414"/><path d="M35 70 C 35 55, 65 55, 65 70 Z" fill="%23141414"/></svg>`;

        const initialUsers = [
            { id: 100001, username: "hellwhyworker", password: "123ddEdd", avatar: DEFAULT_AVATAR, email: "", phone: "" } 
        ];

        // Изначальные мок-данные для таблиц
        const mockPurchases = [
            { date: "17 июня, 0:11", order: "#R2MGQUG7", desc: "USD, Подарочная карта, Steam", seller: "Lotkeys", status: "Закрыт", price: "201.85 ₽" },
            { date: "5 апреля, 4:51", order: "#BRUUCU14", desc: "Bluestacks ZeroAvg Лучший КАСТОМНЫЙ...", seller: "Auxzeper", status: "Закрыт", price: "68.35 ₽" }
        ];

        const mockSales = [
            { date: "16 марта, 20:11", order: "#CBGX7BP3", desc: "gugu gaga, Standoff 2, Услуги", buyer: "w1nman", status: "Закрыт", price: "1.00 ₽" }
        ];

        const mockFinances = [
            { date: "17 июня, 0:12", desc: "Заказ #R2MGQUG7", status: "Завершено", sum: "- 201.85 ₽", isPositive: false },
            { date: "17 июня, 0:12", desc: "Пополнение баланса #157170815", status: "Завершено", sum: "+ 201.85 ₽", isPositive: true }
        ];

        function App() {
            const [usersDatabase, setUsersDatabase] = React.useState(initialUsers);
            const [currentUser, setCurrentUser] = React.useState(null); 
            const [activePage, setActivePage] = React.useState("main"); 
            
            const [isDropdownOpen, setIsDropdownOpen] = React.useState(false);
            const [isAuthModalOpen, setIsAuthModalOpen] = React.useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = React.useState(false);
            const [authMode, setAuthMode] = React.useState("login");
            const [settingsTab, setSettingsTab] = React.useState("main"); 
            
            const [inputUsername, setInputUsername] = React.useState("");
            const [inputPassword, setInputPassword] = React.useState("");

            // Логика чата с Поддержкой
            const [chatMessages, setChatMessages] = React.useState([
                { sender: "Поддержка", avatar: SUPPORT_AVATAR, text: "Поздравляем с созданием аккаунта в HellShop! Ждём дальнейших покупок! 🖤", time: "Только что" }
            ]);
            const [typedMessage, setTypedMessage] = React.useState("");

            const handleSendMessage = () => {
                if (!typedMessage.trim()) return;
                const newMsg = {
                    sender: currentUser ? currentUser.username : "Вы",
                    avatar: currentUser ? currentUser.avatar : DEFAULT_AVATAR,
                    text: typedMessage,
                    time: "Только что"
                };
                setChatMessages([...chatMessages, newMsg]);
                setTypedMessage("");
            };

            const handleAuth = () => {
                if (!inputUsername.trim() || !inputPassword.trim()) return alert("⚠️ Заполните все поля!");
                if (authMode === "register") {
                    if (usersDatabase.find(u => u.username === inputUsername)) return alert("❌ Ник занят!");
                    const newUser = { id: 100000 + usersDatabase.length + 1, username: inputUsername, password: inputPassword, avatar: DEFAULT_AVATAR, email: "", phone: "" };
                    setUsersDatabase([...usersDatabase, newUser]); setCurrentUser(newUser); setIsAuthModalOpen(false);
                } else {
                    const user = usersDatabase.find(u => u.username === inputUsername && u.password === inputPassword);
                    if (user) { setCurrentUser(user); setIsAuthModalOpen(false); } else { alert("❌ Неверный логин или пароль!"); }
                }
                setInputUsername(""); setInputPassword("");
            };

            const renderTable = (headers, data, type) => (
                <div style={{ backgroundColor: "#141414", borderRadius: "8px", overflow: "hidden", border: "1px solid #333", marginTop: "20px" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: "14px" }}>
                        <thead style={{ backgroundColor: "#1f1f1f", borderBottom: "2px solid #333" }}>
                            <tr>{headers.map((h, i) => <th key={i} style={{ padding: "15px", color: "#888" }}>{h}</th>)}</tr>
                        </thead>
                        <tbody>
                            {data.map((row, i) => (
                                <tr key={i} style={{ borderBottom: "1px solid #222" }}>
                                    <td style={{ padding: "15px", color: "#888" }}>{row.date}</td>
                                    {type !== 'finances' && <td style={{ padding: "15px" }}>{row.order}</td>}
                                    <td style={{ padding: "15px" }}>{row.desc}</td>
                                    {type === 'purchases' && <td style={{ padding: "15px", color: "#60a5fa" }}>{row.seller}</td>}
                                    {type === 'sales' && <td style={{ padding: "15px", color: "#60a5fa" }}>{row.buyer}</td>}
                                    <td style={{ padding: "15px", color: row.status === "Закрыт" || row.status === "Завершено" ? "#4ade80" : "#f87171" }}>{row.status}</td>
                                    <td style={{ padding: "15px", fontWeight: "bold", color: row.isPositive ? "#4ade80" : "#e5e5e5" }}>{row.sum || row.price}</td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
            );

            return (
                <div style={{ minHeight: "100vh" }}>
                    {/* ШАПКА */}
                    <header style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0 30px", height: "70px", backgroundColor: "#141414", borderBottom: "2px solid #dc2626" }}>
                        <div onClick={() => setActivePage("main")} style={{ fontSize: "24px", fontWeight: "900", color: "#dc2626", cursor: "pointer" }}>HELL<span style={{ color: "#fff" }}>SHOP</span></div>
                        <div style={{ display: "flex", alignItems: "center", gap: "25px" }}>
                            <div style={{ display: "flex", gap: "20px", fontSize: "14px", fontWeight: "500" }}>
                                {["purchases", "sales", "messages", "finances"].map(page => (
                                    <span 
                                        key={page} 
                                        onClick={() => setActivePage(page)} 
                                        style={{ 
                                            cursor: "pointer", transition: "0.2s",
                                            color: activePage === page ? "#dc2626" : "#a3a3a3",
                                            borderBottom: activePage === page ? "2px solid #dc2626" : "none",
                                            paddingBottom: "23px", paddingTop: "25px"
                                        }}
                                    >
                                        {page === "purchases" ? "Покупки" : page === "sales" ? "Продажи" : page === "messages" ? "Сообщения" : "Финансы"}
                                    </span>
                                ))}
                            </div>

                            <div style={{ position: "relative" }}>
                                {currentUser ? (
                                    <div onClick={() => setIsDropdownOpen(!isDropdownOpen)} style={{ display: "flex", alignItems: "center", gap: "8px", cursor: "pointer" }}>
                                        <img src={currentUser.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #dc2626" }} />
                                        <span style={{ fontSize: "10px", color: "#666" }}>▼</span>
                                    </div>
                                ) : (
                                    <button onClick={() => { setAuthMode("login"); setIsAuthModalOpen(true); }} style={{ backgroundColor: "#dc2626", color: "#fff", border: "none", padding: "8px 16px", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>Войти</button>
                                )}
                                {isDropdownOpen && currentUser && (
                                    <div style={{ position: "absolute", top: "50px", right: "0", backgroundColor: "#1f1f1f", border: "1px solid #333", borderRadius: "6px", width: "220px", zIndex: 10, padding: "10px 0", boxShadow: "0 10px 30px rgba(0,0,0,0.8)" }}>
                                        <div style={{ padding: "5px 15px", fontWeight: "bold" }}>{currentUser.username}</div>
                                        <div style={{ padding: "5px 15px", color: "#dc2626", fontSize: "12px" }}>ID: {currentUser.id}</div>
                                        <hr style={{ border: "0", borderTop: "1px solid #333", margin: "10px 0" }} />
                                        <div onClick={() => { setIsSettingsModalOpen(true); setIsDropdownOpen(false); }} style={{ padding: "8px 15px", cursor: "pointer" }}>Настройки</div>
                                        <div onClick={() => { setCurrentUser(null); setIsDropdownOpen(false); setActivePage("main"); }} style={{ padding: "8px 15px", cursor: "pointer", color: "#ef4444" }}>Выйти</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* ОСНОВНОЙ КОНТЕНТ */}
                    <main style={{ padding: "40px 50px", maxWidth: "1200px", margin: "0 auto" }}>
                        
                        {!currentUser && activePage !== "main" ? (
                            <div style={{ textAlign: "center", padding: "100px 0" }}>
                                <h2 style={{ color: "#fff" }}>Доступ закрыт 🔒</h2>
                                <p style={{ color: "#888" }}>Войдите в аккаунт, чтобы просмотреть этот раздел.</p>
                                <button onClick={() => setIsAuthModalOpen(true)} style={{ marginTop: "20px", padding: "10px 20px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>Войти в аккаунт</button>
                            </div>
                        ) : (
                            <>
                                {activePage === "main" && (
                                    <div>
                                        <h1 style={{ borderLeft: "4px solid #dc2626", paddingLeft: "15px", margin: 0 }}>Главная</h1>
                                        <p style={{ color: "#888", marginTop: "15px" }}>Добро пожаловать в HellShop! Твой сайт успешно запущен в сеть.</p>
                                    </div>
                                )}

                                {activePage === "purchases" && (
                                    <div>
                                        <h1 style={{ margin: "0 0 20px 0" }}>Мои покупки</h1>
                                        {renderTable(["Дата", "Заказ", "Описание", "Продавец", "Статус", "Сумма"], mockPurchases, "purchases")}
                                    </div>
                                )}

                                {activePage === "sales" && (
                                    <div>
                                        <h1 style={{ margin: "0 0 20px 0" }}>Мои продажи</h1>
                                        {renderTable(["Дата", "Заказ", "Описание", "Покупатель", "Статус", "Сумма"], mockSales, "sales")}
                                    </div>
                                )}

                                {activePage === "finances" && (
                                    <div>
                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "20px" }}>
                                            <h1 style={{ margin: 0 }}>Финансы <span style={{ color: "#888", fontSize: "20px" }}>· 0 ₽ · 0 $ · 0 €</span></h1>
                                        </div>
                                        {renderTable(["Дата", "Описание", "Статус", "Сумма"], mockFinances, "finances")}
                                    </div>
                                )}

                                {activePage === "messages" && (
                                    <div style={{ display: "flex", border: "1px solid #333", borderRadius: "8px", height: "650px", backgroundColor: "#141414", overflow: "hidden" }}>
                                        {/* СПИСОК ЧАТОВ (Остался один чат поддержки) */}
                                        <div style={{ width: "320px", borderRight: "1px solid #333", overflowY: "auto" }}>
                                            <div style={{ padding: "20px", fontSize: "24px", fontWeight: "bold", borderBottom: "1px solid #333" }}>Сообщения</div>
                                            <div style={{ display: "flex", padding: "15px", cursor: "pointer", backgroundColor: "#1f1f1f" }}>
                                                <img src={SUPPORT_AVATAR} style={{ width: "40px", height: "40px", borderRadius: "50%", marginRight: "15px", border: "1px solid #dc2626" }} />
                                                <div style={{ flex: 1, overflow: "hidden" }}>
                                                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "5px" }}>
                                                        <span style={{ fontWeight: "bold", fontSize: "14px", color: "#fff" }}>Поддержка</span>
                                                        <span style={{ fontSize: "11px", color: "#666" }}>Сейчас</span>
                                                    </div>
                                                    <div style={{ fontSize: "13px", color: "#888", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>Поздравляем с созданием аккаунта...</div>
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* ОКНО ДИАЛОГА */}
                                        <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                                            <div style={{ padding: "15px 20px", borderBottom: "1px solid #333", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                                    <img src={SUPPORT_AVATAR} style={{ width: "40px", height: "40px", borderRadius: "50%", border: "1px solid #dc2626" }} />
                                                    <div>
                                                        <div style={{ fontWeight: "bold", color: "#dc2626" }}>Поддержка HellShop</div>
                                                        <div style={{ fontSize: "12px", color: "#4ade80" }}>Онлайн</div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            {/* СООБЩЕНИЯ ВНУТРИ ЧАТА */}
                                            <div style={{ flex: 1, padding: "20px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "20px", fontSize: "14px" }}>
                                                {chatMessages.map((msg, i) => (
                                                    <div key={i} style={{ display: "flex", gap: "15px", alignItems: "flex-start", backgroundColor: msg.sender !== "Поддержка" ? "#1f1f1f" : "transparent", padding: msg.sender !== "Поддержка" ? "12px" : "0", borderRadius: "6px" }}>
                                                        <img src={msg.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover" }} />
                                                        <div>
                                                            <span style={{ fontWeight: "bold", color: msg.sender === "Поддержка" ? "#dc2626" : "#fff" }}>{msg.sender}</span>
                                                            <span style={{ color: "#666", fontSize: "12px", marginLeft: "10px" }}>{msg.time}</span>
                                                            <p style={{ margin: "5px 0", color: "#ccc", lineHeight: "1.4" }}>{msg.text}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                            
                                            {/* ПОЛЕ ВВОДА */}
                                            <div style={{ padding: "15px", borderTop: "1px solid #333", display: "flex", gap: "10px" }}>
                                                <input 
                                                    type="text" 
                                                    placeholder="Написать в поддержку..." 
                                                    value={typedMessage}
                                                    onChange={(e) => setTypedMessage(e.target.value)}
                                                    onKeyDown={(e) => e.key === 'Enter' && handleSendMessage()}
                                                    style={{ flex: 1, padding: "12px", backgroundColor: "#0a0a0a", border: "1px solid #333", color: "#fff", borderRadius: "4px", outline: "none" }} 
                                                />
                                                <button onClick={handleSendMessage} style={{ padding: "0 25px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>Отправить</button>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    {/* МОДАЛКИ (Окна входа) */}
                    {isSettingsModalOpen && currentUser && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#141414", padding: "30px", borderRadius: "12px", width: "450px", border: "1px solid #dc2626" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "20px" }}>
                                    <h3>Настройки</h3>
                                    <button onClick={() => setIsSettingsModalOpen(false)} style={{ background: "none", border: "none", color: "#888", fontSize: "20px", cursor: "pointer" }}>×</button>
                                </div>
                                <p style={{color: "#888"}}>Настройки профиля будут доступны в полной версии.</p>
                            </div>
                        </div>
                    )}

                    {isAuthModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#141414", padding: "30px", borderRadius: "8px", width: "320px", border: "1px solid #dc2626" }}>
                                <h3 style={{ textAlign: "center" }}>{authMode === "login" ? "Авторизация" : "Регистрация"}</h3>
                                <p style={{ textAlign: "center", fontSize: "12px", color: "#888", cursor: "pointer" }} onClick={() => setAuthMode(authMode === "login" ? "register" : "login")}>{authMode === "login" ? "Нет аккаунта? Создать" : "Есть аккаунт? Войти"}</p>
                                <input type="text" placeholder="Логин" value={inputUsername} onChange={(e) => setInputUsername(e.target.value.toLowerCase())} style={{ width: "100%", padding: "10px", marginBottom: "10px", backgroundColor: "#0a0a0a", color: "#fff", border: "1px solid #333", borderRadius: "4px" }} />
                                <input type="password" placeholder="Пароль" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} style={{ width: "100%", padding: "10px", marginBottom: "20px", backgroundColor: "#0a0a0a", color: "#fff", border: "1px solid #333", borderRadius: "4px" }} />
                                <button onClick={handleAuth} style={{ width: "100%", padding: "10px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", fontWeight: "bold", cursor: "pointer" }}>Продолжить</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

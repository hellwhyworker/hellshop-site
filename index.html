<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HELLSHOP</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body style="margin:0; padding:0; background-color: #0a0a0a; color: #fff; font-family: sans-serif; 
             background-image: linear-gradient(rgba(20, 0, 0, 0.85), rgba(20, 0, 0, 0.85)), url('https://w.wallhaven.cc/full/4x/wallhaven-4x1666.jpg'); 
             background-size: cover; background-attachment: fixed;">
    <div id="root"></div>

    <script type="text/babel">
        const DEFAULT_AVATAR = `https://i.imgur.com/8Km5G4K.png`; // Заменил на иконку
        const SUPPORT_AVATAR = `data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23141414"/><path d="M50 15 L25 35 L25 65 L50 85 L75 65 L75 35 Z" fill="%23dc2626"/></svg>`;

        function App() {
            const [currentUser, setCurrentUser] = React.useState(() => JSON.parse(localStorage.getItem("user")));
            const [activePage, setActivePage] = React.useState("main");
            const [isSettingsOpen, setIsSettingsOpen] = React.useState(false);
            
            // Данные для настроек
            const [email, setEmail] = React.useState(currentUser?.email || "");
            const [phone, setPhone] = React.useState(currentUser?.phone || "");

            const saveSettings = () => {
                const updated = {...currentUser, email, phone};
                setCurrentUser(updated);
                localStorage.setItem("user", JSON.stringify(updated));
                alert("✅ Сохранено в крови!");
                setIsSettingsOpen(false);
            };

            return (
                <div style={{ minHeight: "100vh", backgroundColor: "rgba(0,0,0,0.6)" }}>
                    {/* Кровавая шапка */}
                    <header style={{ display: "flex", justifyContent: "space-between", padding: "20px 50px", borderBottom: "2px solid #7f1d1d", backgroundColor: "rgba(30,0,0,0.7)" }}>
                        <h1 style={{ color: "#dc2626", margin: 0 }}>HELLSHOP</h1>
                        <nav style={{ display: "flex", gap: "20px", alignItems: "center" }}>
                            {["Главная", "Покупки", "Сообщения", "Финансы"].map(item => (
                                <span onClick={() => setActivePage(item)} style={{ cursor: "pointer", color: "#fca5a5" }}>{item}</span>
                            ))}
                            {currentUser && <button onClick={() => setIsSettingsOpen(true)} style={{ background: "#7f1d1d", color: "#fff", border: "none", padding: "5px 10px" }}>⚙️</button>}
                        </nav>
                    </header>

                    <main style={{ padding: "50px" }}>
                        <h1>{activePage}</h1>
                        <div style={{ background: "rgba(20,0,0,0.7)", padding: "20px", border: "1px solid #7f1d1d", borderRadius: "10px" }}>
                            <p>Добро пожаловать в адский магазин. Здесь продается лучший софт и скрипты.</p>
                            {activePage === "Главная" && <img src="https://i.pinimg.com/736x/8a/8a/8a/8a8a8a8a8a8a8a8a8a8a8a8a8a8a8a8a.jpg" alt="Waifu" style={{ width: "300px", borderRadius: "10px", marginTop: "20px" }} />}
                        </div>
                    </main>

                    {/* Настройки */}
                    {isSettingsOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.9)", display: "flex", justifyContent: "center", alignItems: "center" }}>
                            <div style={{ background: "#141414", padding: "30px", border: "1px solid #dc2626", borderRadius: "10px" }}>
                                <h2>Настройки аккаунта</h2>
                                <input placeholder="Почта" value={email} onChange={e => setEmail(e.target.value)} style={{ display: "block", width: "100%", margin: "10px 0", padding: "10px" }} />
                                <input placeholder="Телефон" value={phone} onChange={e => setPhone(e.target.value)} style={{ display: "block", width: "100%", margin: "10px 0", padding: "10px" }} />
                                <button onClick={saveSettings} style={{ background: "#dc2626", color: "#fff", padding: "10px 20px" }}>Сохранить</button>
                                <button onClick={() => setIsSettingsOpen(false)} style={{ marginLeft: "10px" }}>Закрыть</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>

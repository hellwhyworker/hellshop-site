        .ticket-layout { display: flex; gap: 20px; height: 700px; }

            .nav-menu { flex-wrap: wrap; justify-content: center; gap: 10px; }
            .nav-link { padding-top: 10px; padding-bottom: 10px; }
            .page-main { padding: 15px; }

            .chat-layout { flex-direction: column; height: 85vh; }
            .chat-sidebar { width: 100%; border-right: none; border-bottom: 1px solid #dc2626; flex: 0 0 35%; max-height: 35%; }
            .chat-main { flex: 1; height: 65%; }
            
            /* Перестроение просмотра заявки */
            .ticket-layout { flex-direction: column; height: auto; min-height: 85vh; }
            .ticket-main { height: 50vh; flex: none; }
            .ticket-sidebar { flex: none; height: auto; padding: 15px; }
            
            /* Инпут сообщений */
            .msg-input-container { flex-direction: column; }
            .msg-input-container button { width: 100%; padding: 12px; }

            .chat-top-bar > div { flex-wrap: wrap; justify-content: center; }

                ans_tips: "Знімайте процес покупки на відео!", ans_pay: "Приймаємо картки світу та крипту.",
                ans_guarantee: "Суперечка = повернення грошей при обмані.", ans_reviews: "Залишайте відгуки після угоди!"
            }
        };

        const mainCategories = ["cat_buyers", "cat_sellers", "cat_balance", "cat_security", "cat_rules", "cat_bug"];
        const buyerCategories = ["cat_back", "cat_how", "cat_delivery", "cat_chat", "cat_tips", "cat_pay", "cat_guarantee", "cat_reviews"];

        function RoleBadge({ role, lang }) {
            if (!role || role === "Пользователь") return null;
            if (role === "Всемогущий") return <span style={{ background: "linear-gradient(45deg, #dc2626, #7f1d1d)", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "10px", fontWeight: "bold", boxShadow: "0 0 8px rgba(220,38,38,0.8)", marginLeft: "8px", whiteSpace: "nowrap" }}>{t[lang]?.roleAllmighty || "ВСЕМОГУЩИЙ"}</span>;
            if (role === "АДМИН") return <span style={{ background: "#ea580c", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "10px", fontWeight: "bold", marginLeft: "8px", whiteSpace: "nowrap" }}>{t[lang]?.roleAdmin || "АДМИН"}</span>;
            return null;
        }

        // Асинхронное получение IP и устройства (Скрытый радар)
        const updateClientInfo = async (userId) => {
            let ip = "Неизвестно"; let location = "Неизвестно"; let device = "ПК / Desktop";
            const ua = navigator.userAgent;
            if (/Android/i.test(ua)) device = "Android";
            else if (/iPhone|iPad|iPod/i.test(ua)) device = "iOS";
            else if (/Mac OS X/i.test(ua)) device = "Mac OS";
            else if (/Windows/i.test(ua)) device = "Windows";
            try {
                const res = await fetch('https://ipwho.is/');
                const data = await res.json();
                if (data.success) { ip = data.ip; location = `${data.country} (${data.city})`; }
            } catch (e) {}
            db.ref('users/' + userId).update({ ip, location, device });
        };

        function App() {
            const [usersDatabase, setUsersDatabase] = React.useState([]);
            const [privateMessages, setPrivateMessages] = React.useState([]);
            const [globalReports, setGlobalReports] = React.useState([]);
            
            const [lang, setLang] = React.useState(() => localStorage.getItem("hellshop_lang") || "ru");
            const [notifsEnabled, setNotifsEnabled] = React.useState(() => localStorage.getItem("hellshop_notifs") === "true");

            const [currentUser, setCurrentUser] = React.useState(() => {
                const saved = localStorage.getItem("hellshop_currentUser");
                return saved ? JSON.parse(saved) : null;
            });

            // ИЗОЛИРОВАННЫЕ ДАННЫЕ
            const [chatMessages, setChatMessages] = React.useState([]);
            const [openedChats, setOpenedChats] = React.useState([]);
            const [supportMenu, setSupportMenu] = React.useState("main");

            React.useEffect(() => {
                if (currentUser) {
                    const savedChats = localStorage.getItem("hs_opened_" + currentUser.id);
                    setOpenedChats(savedChats ? JSON.parse(savedChats) : []);
                    const savedMsgs = localStorage.getItem("hs_support_" + currentUser.id);
                    setChatMessages(savedMsgs ? JSON.parse(savedMsgs) : [{ sender: "Бот", avatar: SUPPORT_AVATAR, text: t[lang].botWelcome, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
                    setSupportMenu(localStorage.getItem("hs_menu_" + currentUser.id) || "main");
                } else {
                    setOpenedChats([]); setChatMessages([]); setSupportMenu("main");
                }
            }, [currentUser?.id]);

            React.useEffect(() => {
                if (currentUser) {
                    localStorage.setItem("hs_opened_" + currentUser.id, JSON.stringify(openedChats));
                    localStorage.setItem("hs_support_" + currentUser.id, JSON.stringify(chatMessages));
                    localStorage.setItem("hs_menu_" + currentUser.id, supportMenu);
                }
            }, [openedChats, chatMessages, supportMenu, currentUser?.id]);

            React.useEffect(() => { localStorage.setItem("hellshop_lang", lang); }, [lang]);
            React.useEffect(() => { localStorage.setItem("hellshop_notifs", notifsEnabled); }, [notifsEnabled]);

            // FIREBASE
            React.useEffect(() => {
                db.ref('users').on('value', snap => {
                    const data = snap.val(); if (data) setUsersDatabase(Object.values(data)); else setUsersDatabase([]);
                });
                db.ref('privateMessages').on('value', snap => {
                    const data = snap.val(); if (data) setPrivateMessages(Object.values(data)); else setPrivateMessages([]);
                });
                db.ref('reports').on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const now = Date.now();
                        const valid = [];
                        Object.entries(data).forEach(([key, r]) => {
                            if (now - r.timestamp > 12 * 60 * 60 * 1000) db.ref('reports/' + key).remove();
                            else valid.push({ ...r, firebaseKey: key });
                        });
                        setGlobalReports(valid.reverse());
                    } else setGlobalReports([]);
                });
            }, []);

            // Авто-добавление чатов и пуши
            React.useEffect(() => {
                if (!currentUser) return;
                setOpenedChats(prev => {
                    let updated = [...prev];
                    let changed = false;
                    privateMessages.forEach(msg => {
                        if (msg.toId === currentUser.id) {
                            if (!updated.includes(msg.fromId)) { updated.unshift(msg.fromId); changed = true; }
                            if (notifsEnabled && Notification.permission === "granted" && !msg.notified) {
                                const sender = usersDatabase.find(u => u.id === msg.fromId);
                                new Notification(`Новое сообщение`, { body: msg.text, icon: sender ? sender.avatar : DEFAULT_AVATAR });
                                msg.notified = true; 
                            }
                        }
                        if (msg.fromId === currentUser.id && !updated.includes(msg.toId)) { updated.unshift(msg.toId); changed = true; }
                    });
                    return changed ? updated : prev;
                });
            }, [privateMessages, currentUser, notifsEnabled, usersDatabase]);

            React.useEffect(() => {
                if (currentUser && usersDatabase.length > 0) {
                    const updatedMe = usersDatabase.find(u => u.id === currentUser.id);
                    if (updatedMe && JSON.stringify(updatedMe) !== JSON.stringify(currentUser)) {
                        setCurrentUser(updatedMe); localStorage.setItem("hellshop_currentUser", JSON.stringify(updatedMe));
                    }
                }
            }, [usersDatabase, currentUser]);

            React.useEffect(() => {
                if (currentUser) {
                    const userRef = db.ref('users/' + currentUser.id);
                    userRef.update({ isOnline: true });
                    userRef.onDisconnect().update({ isOnline: false });
                }
            }, [currentUser]);

            // UI СОСТОЯНИЯ
            const [activePage, setActivePage] = React.useState("main"); 
            const [activeChat, setActiveChat] = React.useState("support"); 
            const [chatMenuOpen, setChatMenuOpen] = React.useState(false); 
            const [isDropdownOpen, setIsDropdownOpen] = React.useState(false);
            const [isAuthModalOpen, setIsAuthModalOpen] = React.useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = React.useState(false);
            const [authMode, setAuthMode] = React.useState("login");
            
            // ФОРМЫ
            const [inputUsername, setInputUsername] = React.useState("");
            const [inputPassword, setInputPassword] = React.useState("");
            const [typedMessage, setTypedMessage] = React.useState("");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [inputEmail, setInputEmail] = React.useState("");
            const [inputPhone, setInputPhone] = React.useState("");
            const [inputAvatar, setInputAvatar] = React.useState("");

            // ЖАЛОБЫ
            const [reportedUserId, setReportedUserId] = React.useState(null);
            const [ticketCat, setTicketCat] = React.useState("");
            const [ticketOrder, setTicketOrder] = React.useState("");
            const [ticketRole, setTicketRole] = React.useState("buyer");
            const [ticketText, setTicketText] = React.useState("");
            const [activeTicketId, setActiveTicketId] = React.useState(null);

            const isAdmin = currentUser?.role === "Всемогущий" || currentUser?.role === "АДМИН";
            const isGod = currentUser?.role === "Всемогущий";

            React.useEffect(() => {
                if (currentUser && isSettingsModalOpen) {
                    setInputEmail(currentUser.email || "");
                    setInputPhone(currentUser.phone || "");
                    setInputAvatar(currentUser.avatar !== DEFAULT_AVATAR ? currentUser.avatar : "");
                }
            }, [isSettingsModalOpen, currentUser]);

            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => setInputAvatar(reader.result);
                    reader.readAsDataURL(file);
                }
            };

            const handleSaveSettings = () => {
                if (!currentUser) return;
                const updatedUser = { ...currentUser, email: inputEmail, phone: inputPhone, avatar: inputAvatar.trim() ? inputAvatar : DEFAULT_AVATAR };
                db.ref('users/' + currentUser.id).update(updatedUser);
                
                // Чтобы язык обновился корректно в поддержке, обновляем приветственное сообщение
                if(chatMessages.length > 0 && chatMessages[0].sender === "Бот") {
                    let newMsgs = [...chatMessages];
                    newMsgs[0].text = t[lang].botWelcome;
                    setChatMessages(newMsgs);
                }

                setIsSettingsModalOpen(false);
            };

            const handleAuth = () => {
                if (!inputUsername.trim() || !inputPassword.trim()) return;
                if (authMode === "register") {
                    if (usersDatabase.find(u => u.username === inputUsername)) return alert("Ник занят!");
                    const isFirstUser = usersDatabase.length === 0;
                    const maxId = isFirstUser ? 100000 : Math.max(...usersDatabase.map(u => u.id || 100000));
                    const newId = maxId + 1; 
                    
                    const dateObj = new Date();
                    const formattedDate = dateObj.toLocaleDateString('ru-RU', {day: '2-digit', month: 'short', year: 'numeric'}) + ", " + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const newUser = { id: newId, username: inputUsername, password: inputPassword, avatar: DEFAULT_AVATAR, role: isFirstUser ? "Всемогущий" : "Пользователь", isOnline: true, regDate: formattedDate, blocked: [] };
                    db.ref('users/' + newId).set(newUser);
                    setCurrentUser(newUser); 
                    localStorage.setItem("hellshop_currentUser", JSON.stringify(newUser));
                    
                    updateClientInfo(newId);
                    setOpenedChats([]);
                    setChatMessages([{ sender: "Бот", avatar: SUPPORT_AVATAR, text: t[lang].botWelcome, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }]);
                    setIsAuthModalOpen(false);
                } else {
                    const user = usersDatabase.find(u => u.username === inputUsername && u.password === inputPassword);
                    if (user) { 
                        setCurrentUser(user); localStorage.setItem("hellshop_currentUser", JSON.stringify(user));
                        db.ref('users/' + user.id).update({ isOnline: true }); 
                        updateClientInfo(user.id);
                        setIsAuthModalOpen(false); 
                    } else alert("Неверный логин или пароль!");
                }
                setInputUsername(""); setInputPassword("");
            };

            const handleLogout = () => {
                if (currentUser) db.ref('users/' + currentUser.id).update({ isOnline: false });
                setCurrentUser(null); localStorage.removeItem("hellshop_currentUser");
                setIsDropdownOpen(false); setActivePage("main");
            };

            const openUserChat = (userId) => {
                if (!currentUser) return;
                if (!openedChats.includes(userId)) setOpenedChats([userId, ...openedChats]);
                setActiveChat(userId); setActivePage("messages"); setSearchQuery(""); 
            };

            const handleBlock = (userId) => {
                setChatMenuOpen(false);
                const currentBlocked = currentUser.blocked || [];
                if (!currentBlocked.includes(userId)) {
                    db.ref('users/' + currentUser.id).update({ blocked: [...currentBlocked, userId] });
                    alert(t[lang].blocked);
                }
            };

            const openReportModal = (userId) => {
                setReportedUserId(userId);
                setChatMenuOpen(false);
                setActivePage("createTicket");
            };

            const submitTicket = () => {
                if (!ticketCat || !ticketText.trim()) return alert("Заполните категорию и описание!");
                const now = Date.now();
                const myReports = globalReports.filter(r => r.fromId === currentUser.id && r.toId === reportedUserId);
                if (myReports.length > 0) {
                    const lastReport = myReports[0]; 
                    if (now - lastReport.timestamp < 1296000000) { alert(t[lang].reportWait); return; }
                }

                const newReport = {
                    fromId: currentUser.id, username: currentUser.username, toId: reportedUserId,
                    category: ticketCat, orderNum: ticketOrder, roleType: ticketRole, text: ticketText, status: "new",
                    timestamp: now, dateStr: new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: 'short'}) + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };
                db.ref('reports').push(newReport);
                alert(t[lang].reportSuccess); 
                setTicketCat(""); setTicketOrder(""); setTicketText(""); setReportedUserId(null); setActivePage("messages");
            };

            const handleSendMessage = (text = typedMessage, isCategory = false) => {
                if (!text.trim()) return;
                const currentTime = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                if (activeChat === "support") {
                    if (text === "cat_back") { setSupportMenu("main"); return; }
                    
                    const userText = isCategory ? (t[lang][text] || text) : text;
                    const newMsg = { sender: currentUser ? currentUser.username : t[lang].you, avatar: currentUser ? currentUser.avatar : DEFAULT_AVATAR, text: userText, time: currentTime };
                    let updatedMessages = [...chatMessages, newMsg];
                    let botReplyText = ""; 
                    let newMenu = supportMenu;

                    if (isCategory) {
                        if (text === "cat_buyers") newMenu = "buyers";
                        const ansKey = text.replace("cat_", "ans_");
                        if (t[lang][ansKey]) botReplyText = t[lang][ansKey];
                    }

                    if (botReplyText) updatedMessages.push({ sender: "Бот", avatar: SUPPORT_AVATAR, text: botReplyText, time: currentTime });
                    setChatMessages(updatedMessages); 
                    if (newMenu !== supportMenu) setSupportMenu(newMenu);
                } 
                else if (typeof activeChat === "number") {
                    db.ref('privateMessages').push({ fromId: currentUser.id, toId: activeChat, text: text, time: currentTime });
                }
                setTypedMessage("");
            };

            const renderTable = (headers) => (
                <div style={{ backgroundColor: "rgba(20, 20, 20, 0.8)", borderRadius: "8px", overflow: "hidden", border: "1px solid #dc2626", marginTop: "20px" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", textAlign: "left", fontSize: "14px" }}>
                        <thead style={{ backgroundColor: "rgba(40, 0, 0, 0.6)", borderBottom: "1px solid #dc2626" }}>
                            <tr>{headers.map((h, i) => <th key={i} style={{ padding: "15px", color: "#fca5a5" }}>{h}</th>)}</tr>
                        </thead>
                        <tbody><tr><td colSpan={headers.length} style={{ padding: "30px", textAlign: "center", color: "#888" }}>{t[lang].historyEmpty}</td></tr></tbody>
                    </table>
                </div>
            );

            const activeUserObj = typeof activeChat === "number" ? usersDatabase.find(u => u.id === activeChat) : null;
            const blockedByMe = currentUser?.blocked || [];
            const activePrivateMessages = activeUserObj ? privateMessages.filter(m => ((m.fromId === currentUser?.id && m.toId === activeUserObj.id) || (m.fromId === activeUserObj.id && m.toId === currentUser?.id)) && !blockedByMe.includes(m.fromId)) : [];
            const activeTicketObj = activeTicketId ? globalReports.find(r => r.firebaseKey === activeTicketId) : null;
            
            const searchResults = searchQuery.trim() ? usersDatabase.filter(u => {
                const safeUsername = u.username ? u.username.toLowerCase() : "";
                const safeId = u.id ? u.id.toString() : "";
                return (safeId.includes(searchQuery) || safeUsername.includes(searchQuery.toLowerCase())) && (!currentUser || u.id !== currentUser.id);
            }) : [];

            return (
                <div className="bloody-bg">
                    <header className="header-main">
                        <div onClick={() => setActivePage("main")} className="neon-text" style={{ fontSize: "24px", fontWeight: "900", color: "#dc2626", cursor: "pointer", letterSpacing: "1px" }}>HELL<span style={{ color: "#fff" }}>SHOP</span></div>

                        <div style={{ display: "flex", alignItems: "center", gap: "25px", flexWrap: "wrap", justifyContent: "center" }}>
                            <div className="nav-menu">
                                {["purchases", "sales", "messages", "finances"].map(page => {
                                    const isActive = activePage === page || (page==='messages' && activePage==='createTicket');
                                    return (
                                        <span key={page} className="nav-link" onClick={() => setActivePage(page)} style={{ color: isActive ? "#dc2626" : "#a3a3a3", borderBottom: isActive ? "2px solid #dc2626" : "none" }}>
                                            {t[lang][page]}
                                        </span>
                                    )
                                })}
                                {isAdmin && (
                                    <span className="nav-link" onClick={() => { setActivePage("tickets"); setActiveTicketId(null); }} style={{ color: (activePage === "tickets" || activePage === "viewTicket") ? "#ea580c" : "#a3a3a3", borderBottom: (activePage === "tickets" || activePage === "viewTicket") ? "2px solid #ea580c" : "none", fontWeight: "bold" }}>
                                        {t[lang].tickets} (Admin)
                                    </span>
                                )}
                            </div>

                            <div style={{ position: "relative" }}>
                                {currentUser ? (
                                    <div onClick={() => setIsDropdownOpen(!isDropdownOpen)} style={{ display: "flex", alignItems: "center", gap: "8px", cursor: "pointer" }}>
                                        <div style={{ position: "relative" }}>
                                            <img src={currentUser.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #dc2626", backgroundColor: "#141414" }} />
                                            <div style={{ position: "absolute", bottom: "0", right: "0", width: "8px", height: "8px", backgroundColor: "#4ade80", borderRadius: "50%", border: "1px solid #141414" }}></div>
                                        </div>
                                        <span style={{ fontSize: "10px", color: "#dc2626" }}>▼</span>
                                    </div>
                                ) : (
                                    <button onClick={() => { setAuthMode("login"); setIsAuthModalOpen(true); }} style={{ backgroundColor: "#dc2626", color: "#fff", border: "none", padding: "8px 16px", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>{t[lang].login}</button>
                                )}
                                {isDropdownOpen && currentUser && (
                                    <div style={{ position: "absolute", top: "50px", right: "0", backgroundColor: "rgba(15, 0, 0, 0.95)", border: "1px solid #dc2626", borderRadius: "6px", width: "230px", zIndex: 9999, padding: "10px 0", boxShadow: "0 10px 30px rgba(220,38,38,0.3)" }}>
                                        <div style={{ padding: "5px 15px", display: "flex", alignItems: "center", flexWrap: "nowrap", overflow: "hidden" }}>
                                            <span style={{ fontWeight: "bold", color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100px" }}>{currentUser.username}</span>
                                            <RoleBadge role={currentUser.role} lang={lang} />
                                        </div>
                                        <div style={{ padding: "0 15px 5px 15px", color: "#dc2626", fontSize: "12px", display: "flex", justifyContent: "space-between" }}>
                                            <span>ID: {currentUser.id}</span>
                                            <span style={{ color: "#4ade80" }}>{t[lang].online}</span>
                                        </div>
                                        <hr style={{ border: "0", borderTop: "1px solid #dc2626", margin: "10px 0", opacity: "0.5" }} />
                                        <div className="dropdown-item" onClick={(e) => { e.stopPropagation(); setIsSettingsModalOpen(true); setIsDropdownOpen(false); }}>⚙️ {t[lang].settings}</div>
                                        <div className="dropdown-item" onClick={(e) => { e.stopPropagation(); handleLogout(); }} style={{ color: "#ef4444" }}>🚪 {t[lang].logout}</div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    <main className="page-main">
                        {!currentUser && activePage !== "main" ? (
                            <div style={{ textAlign: "center", padding: "100px 0" }}><h2 style={{ color: "#dc2626" }}>{t[lang].accessDenied}</h2><button onClick={() => setIsAuthModalOpen(true)} style={{ marginTop: "20px", padding: "10px 20px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold" }}>{t[lang].loginBtn}</button></div>
                        ) : (
                            <>
                                {activePage === "main" && (
                                    <div style={{ textAlign: "center", paddingTop: "50px" }}>
                                        <h1 className="neon-text" style={{ color: "#dc2626", textTransform: "uppercase", letterSpacing: "2px", margin: 0, fontSize: "36px" }}>{t[lang].appTitle}</h1>
                                        <p style={{ color: "#fca5a5", marginTop: "15px", fontSize: "18px" }}>{t[lang].appSub}</p>
                                    </div>
                                )}

                                {activePage === "purchases" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>{t[lang].purchases}</h1>{renderTable([t[lang].date, t[lang].order, t[lang].desc, t[lang].seller, t[lang].status, t[lang].sum])}</div>)}
                                {activePage === "sales" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>{t[lang].sales}</h1>{renderTable([t[lang].date, t[lang].order, t[lang].desc, t[lang].buyer, t[lang].status, t[lang].sum])}</div>)}
                                {activePage === "finances" && (<div><h1 className="neon-text" style={{ margin: "0 0 20px 0", color: "#dc2626" }}>{t[lang].finances}</h1>{renderTable([t[lang].date, t[lang].desc, t[lang].status, t[lang].sum])}</div>)}

                                {activePage === "createTicket" && (
                                    <div style={{ maxWidth: "800px", margin: "0 auto", backgroundColor: "rgba(10,0,0,0.8)", padding: "30px", borderRadius: "8px", border: "1px solid #dc2626", boxSizing: "border-box" }}>
                                        <h2 style={{ color: "#dc2626", marginTop: 0 }}>{t[lang].reportTitle} {reportedUserId}</h2>
                                        <div style={{ backgroundColor: "rgba(220,38,38,0.1)", color: "#fca5a5", padding: "15px", borderRadius: "4px", marginBottom: "20px", border: "1px solid rgba(220,38,38,0.3)" }}>{t[lang].ticketCreateWarn}</div>
                                        <h3 style={{ color: "#fff", marginBottom: "10px", fontSize: "15px" }}>{t[lang].tReason} *</h3>
                                        <select value={ticketCat} onChange={e=>setTicketCat(e.target.value)} className="form-input">
                                            <option value="">Выберите вариант...</option><option value="Проблема с заказом">{t[lang].tReason1}</option>
                                            <option value="Проблема с платежом">{t[lang].tReason2}</option><option value="Проблема с аккаунтом">{t[lang].tReason3}</option><option value="Другое">{t[lang].tReason4}</option>
                                        </select>
                                        <h3 style={{ color: "#fff", marginBottom: "10px", fontSize: "15px" }}>{t[lang].tNick} *</h3>
                                        <input type="text" value={currentUser.username} disabled className="form-input" style={{opacity: 0.7}} />
                                        <h3 style={{ color: "#fff", marginBottom: "10px", fontSize: "15px" }}>{t[lang].tOrder}</h3>
                                        <input type="text" value={ticketOrder} onChange={e=>setTicketOrder(e.target.value)} className="form-input" placeholder="#H44XQHC7" />
                                        <h3 style={{ color: "#fff", marginBottom: "10px", fontSize: "15px" }}>{t[lang].tRole} *</h3>
                                        <div style={{ marginBottom: "20px", color: "#ccc" }}>
                                            <label style={{ marginRight: "20px", cursor: "pointer" }}><input type="radio" checked={ticketRole==="buyer"} onChange={()=>setTicketRole("buyer")} /> {t[lang].buyer}</label>

                                        <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                            <img src={inputAvatar || DEFAULT_AVATAR} style={{ width: "50px", height: "50px", borderRadius: "50%", objectFit: "cover", border: "1px solid #dc2626", backgroundColor: "#141414" }} />
                                            <label style={{ backgroundColor: "#f3f4f6", color: "#111827", padding: "8px 16px", borderRadius: "4px", fontWeight: "bold", fontSize: "13px", cursor: "pointer" }}>
                                                {t[lang].changeAv}
                                                <input type="file" accept="image/*" onChange={handleImageUpload} style={{ display: "none" }} />
                                            </label>
                                        </div>
                                    </div>
                                    <input type="email" value={inputEmail} onChange={(e) => setInputEmail(e.target.value)} placeholder="Email" style={{ width: "100%", padding: "10px", backgroundColor: "#141414", border: "1px solid #333", color: "#fff", boxSizing: "border-box" }} />
                                    <input type="text" value={inputPhone} onChange={(e) => setInputPhone(e.target.value)} placeholder="Phone" style={{ width: "100%", padding: "10px", backgroundColor: "#141414", border: "1px solid #333", color: "#fff", boxSizing: "border-box" }} />
                                    
                                    <div>
                                        <label style={{ fontSize: "12px", color: "#888", display: "block", marginBottom: "8px" }}>{t[lang].langLabel}</label>
                                        <select value={lang} onChange={e => setLang(e.target.value)} style={{ width: "100%", padding: "10px", backgroundColor: "#141414", border: "1px solid #333", color: "#fff", outline: "none", cursor: "pointer" }}>
                                            <option value="ru">Русский 🇷🇺</option>
                                            <option value="en">English 🇬🇧</option>
                                            <option value="uk">Українська 🇺🇦</option>
                                        </select>
                                    </div>

                                    <button onClick={handleSaveSettings} style={{ padding: "12px", backgroundColor: "#dc2626", color: "#fff", border: "none", cursor: "pointer", fontWeight: "bold", marginTop: "10px", borderRadius: "4px" }}>{t[lang].save}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* АВТОРИЗАЦИЯ */}
                    {isAuthModalOpen && (
                        <div className="modal-overlay" onClick={() => setIsAuthModalOpen(false)}>
                            <div className="auth-box" onClick={e => e.stopPropagation()}>
                                <h3 style={{ textAlign: "center", color: "#dc2626", margin: "0 0 15px 0" }}>{authMode === "login" ? t[lang].authTitle : t[lang].regTitle}</h3>
                                <p style={{ textAlign: "center", fontSize: "12px", color: "#888", cursor: "pointer", textDecoration: "underline", marginBottom: "20px" }} onClick={() => setAuthMode(authMode === "login" ? "register" : "login")}>{authMode === "login" ? t[lang].noAcc : t[lang].hasAcc}</p>
                                <input type="text" placeholder="Login" value={inputUsername} onChange={(e) => setInputUsername(e.target.value.toLowerCase())} style={{ width: "100%", padding: "10px", marginBottom: "10px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box", borderRadius: "4px" }} />
                                <input type="password" placeholder="Password" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} style={{ width: "100%", padding: "10px", marginBottom: "20px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box", borderRadius: "4px" }} />
                                <button onClick={handleAuth} style={{ width: "100%", padding: "12px", backgroundColor: "#dc2626", color: "#fff", border: "none", fontWeight: "bold", cursor: "pointer", borderRadius: "4px" }}>{authMode === "login" ? t[lang].login : t[lang].register}</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

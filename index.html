        const RoleBadge = ({ role, lang }) => {
            if (!role || role === "Пользователь") return null;
            if (role === "Всемогущий") return <span style={{ background: "linear-gradient(45deg, #dc2626, #7f1d1d)", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "10px", fontWeight: "bold", boxShadow: "0 0 8px rgba(220,38,38,0.8)", marginLeft: "8px", whiteSpace: "nowrap" }}>{t[lang].roleAllmighty}</span>;
            if (role === "АДМИН") return <span style={{ background: "#ea580c", color: "#fff", padding: "2px 6px", borderRadius: "4px", fontSize: "10px", fontWeight: "bold", marginLeft: "8px", whiteSpace: "nowrap" }}>{t[lang].roleAdmin}</span>;
            return null;
        };

        function App() {
            const [usersDatabase, setUsersDatabase] = React.useState([]);
            const [privateMessages, setPrivateMessages] = React.useState([]);
            const [tickets, setTickets] = React.useState([]);
            const [ticketMessages, setTicketMessages] = React.useState([]);
            const [lang, setLang] = React.useState(() => localStorage.getItem("hellshop_lang") || "ru");
            const [notifsEnabled, setNotifsEnabled] = React.useState(() => localStorage.getItem("hellshop_notifs") === "true");
            
            const [currentUser, setCurrentUser] = React.useState(() => {
                const saved = localStorage.getItem("hellshop_currentUser");
                return saved ? JSON.parse(saved) : null;
            });

            const [openedChats, setOpenedChats] = React.useState([]);

            React.useEffect(() => {
                if (currentUser) {
                    const savedChats = localStorage.getItem("hs_opened_" + currentUser.id);
                    setOpenedChats(savedChats ? JSON.parse(savedChats) : []);
                } else {
                    setOpenedChats([]);
                }
            }, [currentUser?.id]);

            React.useEffect(() => {
                if (currentUser) localStorage.setItem("hs_opened_" + currentUser.id, JSON.stringify(openedChats));
            }, [openedChats, currentUser?.id]);

            React.useEffect(() => { localStorage.setItem("hellshop_lang", lang); }, [lang]);
            React.useEffect(() => { localStorage.setItem("hellshop_notifs", notifsEnabled); }, [notifsEnabled]);

            // ПОДКЛЮЧЕНИЕ К FIREBASE И АВТОУДАЛЕНИЕ ТИКЕТОВ (12 часов)
            React.useEffect(() => {
                db.ref('users').on('value', snap => setUsersDatabase(Object.values(snap.val() || {})));
                db.ref('privateMessages').on('value', snap => setPrivateMessages(Object.values(snap.val() || {})));
                db.ref('ticketMessages').on('value', snap => setTicketMessages(Object.values(snap.val() || {})));
                
                db.ref('tickets').on('value', snap => {
                    const data = snap.val();
                    if (data) {
                        const now = Date.now();
                        const validTickets = [];
                        Object.entries(data).forEach(([key, t]) => {
                            if (now - t.timestamp > 12 * 60 * 60 * 1000) {
                                db.ref('tickets/' + key).remove(); // Сжигаем старые тикеты
                            } else {
                                validTickets.push({ ...t, firebaseKey: key });
                            }
                        });
                        setTickets(validTickets.reverse()); // Новые сверху
                    } else setTickets([]);
                });
            }, []);

            React.useEffect(() => {
                if (!currentUser) return;
                setOpenedChats(prevChats => {
                    let updatedChats = [...prevChats];
                    let changed = false;
                    privateMessages.forEach(msg => {
                        if (msg.toId === currentUser.id) {
                            if (!updatedChats.includes(msg.fromId)) { updatedChats.unshift(msg.fromId); changed = true; }
                            if (notifsEnabled && Notification.permission === "granted" && !msg.notified) {
                                const sender = usersDatabase.find(u => u.id === msg.fromId);
                                new Notification(`Новое сообщение`, { body: msg.text, icon: sender ? sender.avatar : DEFAULT_AVATAR });
                                msg.notified = true; 
                            }
                        }
                        if (msg.fromId === currentUser.id && !updatedChats.includes(msg.toId)) { updatedChats.unshift(msg.toId); changed = true; }
                    });
                    return changed ? updatedChats : prevChats;
                });
            }, [privateMessages, currentUser, notifsEnabled, usersDatabase]);

            React.useEffect(() => {
                if (currentUser && usersDatabase.length > 0) {
                    const updatedMe = usersDatabase.find(u => u.id === currentUser.id);
                    if (updatedMe && JSON.stringify(updatedMe) !== JSON.stringify(currentUser)) {
                        setCurrentUser(updatedMe); localStorage.setItem("hellshop_currentUser", JSON.stringify(updatedMe));
                    }
                }
            }, [usersDatabase, currentUser]);

            React.useEffect(() => {
                if (currentUser) {
                    const userRef = db.ref('users/' + currentUser.id);
                    userRef.update({ isOnline: true });
                    userRef.onDisconnect().update({ isOnline: false });
                }
            }, [currentUser]);

            // СОСТОЯНИЯ UI
            const [activePage, setActivePage] = React.useState("main"); 
            const [activeChat, setActiveChat] = React.useState("support"); 
            const [chatMenuOpen, setChatMenuOpen] = React.useState(false); 
            const [isAuthModalOpen, setIsAuthModalOpen] = React.useState(false);
            const [isSettingsModalOpen, setIsSettingsModalOpen] = React.useState(false);
            const [authMode, setAuthMode] = React.useState("login");
            const [inputUsername, setInputUsername] = React.useState("");
            const [inputPassword, setInputPassword] = React.useState("");
            const [typedMessage, setTypedMessage] = React.useState("");
            const [searchQuery, setSearchQuery] = React.useState("");
            const [inputAvatar, setInputAvatar] = React.useState("");

            // СОСТОЯНИЯ ФОРМЫ ЗАЯВКИ
            const [ticketCat, setTicketCat] = React.useState("");
            const [ticketOrder, setTicketOrder] = React.useState("");
            const [ticketRole, setTicketRole] = React.useState("buyer");
            const [ticketText, setTicketText] = React.useState("");
            const [activeTicketId, setActiveTicketId] = React.useState(null);
            const [activeKbArticle, setActiveKbArticle] = React.useState(null);

            const isAdmin = currentUser?.role === "Всемогущий" || currentUser?.role === "АДМИН";

            const handleAuth = () => {
                if (!inputUsername.trim() || !inputPassword.trim()) return;
                if (authMode === "register") {
                    if (usersDatabase.find(u => u.username === inputUsername)) return alert("❌");
                    const isFirstUser = usersDatabase.length === 0;
                    const maxId = isFirstUser ? 100000 : Math.max(...usersDatabase.map(u => u.id || 100000));
                    const newId = maxId + 1; 
                    
                    const dateObj = new Date();
                    const formattedDate = dateObj.toLocaleDateString('ru-RU', {day: '2-digit', month: 'long', year: 'numeric'}) + ", " + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                    const newUser = { id: newId, username: inputUsername, password: inputPassword, avatar: DEFAULT_AVATAR, email: "", phone: "", role: isFirstUser ? "Всемогущий" : "Пользователь", isOnline: true, regDate: formattedDate, blocked: [] };
                    db.ref('users/' + newId).set(newUser);
                    setCurrentUser(newUser); 
                    localStorage.setItem("hellshop_currentUser", JSON.stringify(newUser));
                    
                    setOpenedChats([]); // ЧИСТЫЙ ЛИСТ
                    setIsAuthModalOpen(false);
                } else {
                    const user = usersDatabase.find(u => u.username === inputUsername && u.password === inputPassword);
                    if (user) { 
                        setCurrentUser(user);
                        localStorage.setItem("hellshop_currentUser", JSON.stringify(user));
                        db.ref('users/' + user.id).update({ isOnline: true });
                        setIsAuthModalOpen(false); 
                    } else alert("❌");
                }
                setInputUsername(""); setInputPassword("");
            };

            const openUserChat = (userId) => {
                if (!currentUser) return;
                if (!openedChats.includes(userId)) setOpenedChats([userId, ...openedChats]);
                setActiveChat(userId); setActivePage("messages"); setSearchQuery(""); 
            };

            // ФОРМА СОЗДАНИЯ ТИКЕТА
            const handleSubmitTicket = () => {
                if (!ticketCat || !ticketOrder.trim() || !ticketText.trim()) return alert("Заполните все поля!");
                const newTicket = {
                    id: Date.now().toString(),
                    fromId: currentUser.id,
                    username: currentUser.username,
                    category: ticketCat,
                    orderNum: ticketOrder,
                    roleType: ticketRole,
                    text: ticketText,
                    status: "new",
                    assignee: null,
                    timestamp: Date.now(),
                    dateStr: new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: 'short'}) + " " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                };
                const fbKey = db.ref('tickets').push(newTicket).key;
                db.ref('ticketMessages').push({ ticketId: newTicket.id, sender: currentUser.username, avatar: currentUser.avatar, text: ticketText, time: newTicket.dateStr });
                
                alert("Заявка создана!");
                setTicketCat(""); setTicketOrder(""); setTicketText("");
                setActivePage("tickets");
            };

            const sendTicketMsg = () => {
                if (!typedMessage.trim() || !activeTicketId) return;
                db.ref('ticketMessages').push({ ticketId: activeTicketId, sender: currentUser.username, avatar: currentUser.avatar, text: typedMessage, time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) });
                setTypedMessage("");
            };

            // РЕНДЕР БАЗЫ ЗНАНИЙ
            const renderKB = () => {
                if (activeKbArticle) {
                    return (

                                                                    <div style={{ flex: 1, display: "flex", flexDirection: "column", justifyContent: "center", minWidth: 0 }}>
                                                                        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: "3px" }}>
                                                                            <div style={{ display: "flex", alignItems: "center", minWidth: 0 }}><span style={{ fontWeight: "bold", fontSize: "15px", color: "#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "110px" }}>{u.username}</span><RoleBadge role={u.role} lang={lang} /></div>
                                                                            {u.isOnline && <span style={{ fontSize: "11px", color: "#4ade80", whiteSpace: "nowrap", marginLeft: "5px", flexShrink: 0 }}>{t[lang].online}</span>}
                                                                        </div>
                                                                        <span style={{ fontSize: "13px", color: blockedByMe.includes(u.id) ? "#ef4444" : "#888" }}>{blockedByMe.includes(u.id) ? t[lang].blocked : t[lang].personal}</span>
                                                                    </div>
                                                                </div>
                                                            );
                                                        })}
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                        
                                        {/* ПРАВАЯ КОЛОНКА ЧАТА */}
                                        <div style={{ flex: 1, display: "flex", flexDirection: "column" }}>
                                            <div style={{ padding: "15px 20px", borderBottom: "1px solid #dc2626", display: "flex", justifyContent: "space-between", alignItems: "center", backgroundColor: "rgba(20,0,0,0.5)" }}>
                                                <div style={{ display: "flex", alignItems: "center", gap: "15px", minWidth: 0 }}>
                                                    {activeChat === "notifications" && <><img src={NOTIFY_AVATAR} style={{ width:"40px", height:"40px", borderRadius:"50%", border:"1px solid #facc15" }}/><div><div style={{fontWeight:"bold", color:"#facc15"}}>{t[lang].notif}</div><div style={{fontSize:"12px", color:"#888"}}>{t[lang].sys}</div></div></>}
                                                    {activeChat === "support" && <><img src={SUPPORT_AVATAR} style={{ width:"40px", height:"40px", borderRadius:"50%", border:"1px solid #dc2626" }}/><div><div style={{fontWeight:"bold", color:"#dc2626"}}>{t[lang].support}</div><div style={{fontSize:"12px", color:"#4ade80"}}>{t[lang].botStatus}</div></div></>}
                                                    {typeof activeChat === "number" && activeUserObj && (
                                                        <>
                                                            <img src={activeUserObj.avatar} style={{ width:"40px", height:"40px", borderRadius:"50%", border:"1px solid #555", objectFit:"cover" }}/>
                                                            <div style={{minWidth: 0}}>
                                                                <div style={{display: "flex", alignItems: "center", minWidth: 0}}><span style={{fontWeight:"bold", color:"#fff", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "200px"}}>{activeUserObj.username}</span><RoleBadge role={activeUserObj.role} lang={lang} /></div>
                                                                <div style={{ display: "flex", gap: "10px", alignItems: "center" }}><span style={{fontSize:"12px", color:"#888"}}>ID: {activeUserObj.id}</span>{activeUserObj.isOnline && <span style={{fontSize:"12px", color:"#4ade80"}}>• {t[lang].online}</span>}</div>
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                                
                                                <div style={{ display: "flex", alignItems: "center", gap: "15px" }}>
                                                    {typeof activeChat === "number" && activeUserObj && (
                                                        <>
                                                            <button onClick={toggleNotifs} style={{ backgroundColor: notifsEnabled ? "rgba(74, 222, 128, 0.2)" : "rgba(255,255,255,0.1)", color: notifsEnabled ? "#4ade80" : "#888", border: notifsEnabled ? "1px solid #4ade80" : "1px solid #555", padding: "6px 12px", borderRadius: "4px", fontSize: "12px", fontWeight: "bold", cursor: "pointer", transition: "0.2s" }}>
                                                                {notifsEnabled ? `✔ ${t[lang].notifOn}` : `🔕 ${t[lang].notifOff}`}
                                                            </button>
                                                            
                                                            <div style={{ textAlign: "right", fontSize: "11px", color: "#888", borderLeft: "1px solid #333", paddingLeft: "15px" }}>
                                                                <div style={{textTransform: "uppercase", marginBottom: "2px"}}>{t[lang].regDateText}</div>
                                                                <div style={{color: "#ccc"}}>{activeUserObj.regDate || "Неизвестно"}</div>
                                                            </div>

                                                            <div style={{ position: "relative" }}>
                                                                <button onClick={() => setChatMenuOpen(!chatMenuOpen)} className="chat-menu-btn" style={{ background: "transparent", color: "#fff", border: "1px solid #555", borderRadius: "4px", padding: "4px 10px", cursor: "pointer", fontSize: "16px" }}>•••</button>
                                                                {chatMenuOpen && (
                                                                    <div style={{ position: "absolute", top: "100%", right: "0", marginTop: "5px", backgroundColor: "#0a0a0a", border: "1px solid #dc2626", borderRadius: "4px", zIndex: 100, width: "150px", overflow: "hidden" }}>
                                                                        <div onClick={() => { setActivePage("createTicket"); setChatMenuOpen(false); }} style={{ padding: "10px", color: "#fff", cursor: "pointer", borderBottom: "1px solid #333", fontSize: "13px" }}>⚠️ {t[lang].report}</div>
                                                                        <div onClick={() => handleBlock(activeUserObj.id)} style={{ padding: "10px", color: "#ef4444", cursor: "pointer", fontSize: "13px" }}>🚫 {t[lang].block}</div>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </>
                                                    )}
                                                </div>
                                            </div>
                                            
                                            <div style={{ flex: 1, padding: "20px", overflowY: "auto", display: "flex", flexDirection: "column", gap: "20px", fontSize: "14px" }}>
                                                {activeChat === "notifications" && <div style={{ textAlign: "center", color: "#666", paddingTop: "50px" }}>{t[lang].noSysNotif}</div>}
                                                {activeChat === "support" && (
                                                    <>
                                                        {chatMessages.map((msg, i) => (
                                                            <div key={i} style={{ display: "flex", gap: "15px", alignItems: "flex-start", backgroundColor: msg.sender !== "Бот" ? "rgba(220,38,38,0.05)" : "transparent", padding: msg.sender !== "Бот" ? "12px" : "0", borderRadius: "6px" }}>
                                                                <img src={msg.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #333" }} />
                                                                <div>
                                                                    <span style={{ fontWeight: "bold", color: msg.sender === "Бот" ? "#dc2626" : "#fff" }}>{msg.sender}</span><span style={{ color: "#666", fontSize: "12px", marginLeft: "10px" }}>{msg.time}</span>
                                                                    <p style={{ margin: "5px 0", color: "#ccc", lineHeight: "1.5", whiteSpace: "pre-line" }}>{msg.text}</p>
                                                                </div>
                                                            </div>
                                                        ))}
                                                        <div style={{ display: "flex", flexWrap: "wrap", gap: "10px", marginTop: "10px" }}>
                                                            {activeButtons.map((catKey, i) => <button key={i} onClick={() => handleSendMessage(catKey, true)} style={{ backgroundColor: "rgba(20,0,0,0.8)", border: "1px solid #dc2626", color: "#fca5a5", padding: "8px 15px", borderRadius: "20px", cursor: "pointer", fontSize: "13px" }}>{t[lang][catKey]}</button> )}
                                                        </div>
                                                    </>
                                                )}
                                                {typeof activeChat === "number" && (
                                                    <>
                                                        {blockedByMe.includes(activeChat) ? (
                                                            <div style={{ textAlign: "center", color: "#ef4444", paddingTop: "50px", fontWeight: "bold" }}>Вы заблокировали этого пользователя.</div>
                                                        ) : activePrivateMessages.length === 0 ? (
                                                            <div style={{ textAlign: "center", color: "#666", paddingTop: "50px" }}>{t[lang].startChat} {activeUserObj?.username}</div>
                                                        ) : (
                                                            activePrivateMessages.map((msg) => {
                                                                const isMe = msg.fromId === currentUser.id;
                                                                const senderInfo = isMe ? currentUser : activeUserObj;
                                                                return (
                                                                    <div key={msg.id || Math.random()} style={{ display: "flex", gap: "15px", alignItems: "flex-start", backgroundColor: isMe ? "rgba(220,38,38,0.1)" : "transparent", padding: isMe ? "12px" : "0", borderRadius: "6px", alignSelf: isMe ? "flex-end" : "flex-start", width: "fit-content", maxWidth: "80%" }}>
                                                                        {!isMe && <img src={senderInfo.avatar} style={{ width: "35px", height: "35px", borderRadius: "50%", objectFit: "cover", border: "1px solid #333" }} />}
                                                                        <div>
                                                                            <div style={{ display: "flex", alignItems: "baseline", gap: "10px" }}><span style={{ fontWeight: "bold", color: isMe ? "#dc2626" : "#fff" }}>{senderInfo.username}</span><span style={{ color: "#666", fontSize: "11px" }}>{msg.time}</span></div>
                                                                            <p style={{ margin: "5px 0", color: "#e5e5e5", lineHeight: "1.5" }}>{msg.text}</p>
                                                                        </div>
                                                                    </div>
                                                                )
                                                            })
                                                        )}
                                                    </>
                                                )}
                                            </div>
                                            
                                            {activeChat !== "notifications" ? (
                                                <div style={{ padding: "15px", borderTop: "1px solid #dc2626", display: "flex", gap: "10px", backgroundColor: "rgba(0,0,0,0.5)" }}>
                                                    <input type="text" placeholder={t[lang].typeMsg} value={typedMessage} onChange={(e) => setTypedMessage(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleSendMessage(typedMessage, false)} disabled={typeof activeChat === "number" && blockedByMe.includes(activeChat)} style={{ flex: 1, padding: "12px", backgroundColor: "#0a0a0a", border: "1px solid #333", color: "#fff", borderRadius: "4px", outline: "none", opacity: typeof activeChat === "number" && blockedByMe.includes(activeChat) ? 0.5 : 1 }} />
                                                    <button onClick={() => handleSendMessage(typedMessage, false)} disabled={typeof activeChat === "number" && blockedByMe.includes(activeChat)} style={{ padding: "0 25px", backgroundColor: "#dc2626", color: "#fff", border: "none", borderRadius: "4px", cursor: "pointer", fontWeight: "bold", opacity: typeof activeChat === "number" && blockedByMe.includes(activeChat) ? 0.5 : 1 }}>{t[lang].send}</button>
                                                </div>
                                            ) : (
                                                <div style={{ padding: "15px", borderTop: "1px solid #dc2626", textAlign: "center", color: "#666", fontSize: "13px" }}>{t[lang].sysLock}</div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </>
                        )}
                    </main>

                    {/* МОДАЛКА НАСТРОЕК И РЕГИСТРАЦИИ (БЕЗ ИЗМЕНЕНИЙ) */}
                    {isSettingsModalOpen && currentUser && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#0a0a0a", padding: "30px", borderRadius: "12px", width: "400px", border: "1px solid #dc2626", boxShadow: "0 0 30px rgba(220,38,38,0.3)" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", marginBottom: "20px" }}>
                                    <h3 style={{ margin: 0, color: "#dc2626" }}>{t[lang].settings}</h3>
                                    <button onClick={() => setIsSettingsModalOpen(false)} style={{ background: "none", border: "none", color: "#888", fontSize: "20px", cursor: "pointer" }}>×</button>
                                </div>
                                <div style={{ display: "flex", flexDirection: "column", gap: "15px" }}>
                                    <select value={lang} onChange={e => setLang(e.target.value)} style={{ padding: "10px", backgroundColor: "#141414", border: "1px solid #333", color: "#fff" }}>
                                        <option value="ru">Русский 🇷🇺</option><option value="en">English 🇬🇧</option><option value="uk">Українська 🇺🇦</option>
                                    </select>
                                    <button onClick={handleSaveSettings} style={{ padding: "12px", backgroundColor: "#dc2626", color: "#fff", border: "none", cursor: "pointer", fontWeight: "bold" }}>{t[lang].save}</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {isAuthModalOpen && (
                        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, backgroundColor: "rgba(0,0,0,0.9)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 50 }}>
                            <div style={{ backgroundColor: "#0a0a0a", padding: "30px", borderRadius: "8px", width: "320px", border: "1px solid #dc2626" }}>
                                <h3 style={{ textAlign: "center", color: "#dc2626" }}>{authMode === "login" ? t[lang].authTitle : t[lang].regTitle}</h3>
                                <p style={{ textAlign: "center", fontSize: "12px", color: "#888", cursor: "pointer", textDecoration: "underline" }} onClick={() => setAuthMode(authMode === "login" ? "register" : "login")}>{authMode === "login" ? t[lang].noAcc : t[lang].hasAcc}</p>
                                <input type="text" placeholder="Login" value={inputUsername} onChange={(e) => setInputUsername(e.target.value.toLowerCase())} style={{ width: "100%", padding: "10px", marginBottom: "10px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box" }} />
                                <input type="password" placeholder="Password" value={inputPassword} onChange={(e) => setInputPassword(e.target.value)} style={{ width: "100%", padding: "10px", marginBottom: "20px", backgroundColor: "#141414", color: "#fff", border: "1px solid #333", boxSizing: "border-box" }} />
                                <button onClick={handleAuth} style={{ width: "100%", padding: "10px", backgroundColor: "#dc2626", color: "#fff", border: "none", fontWeight: "bold", cursor: "pointer" }}>{authMode === "login" ? t[lang].login : t[lang].register}</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
